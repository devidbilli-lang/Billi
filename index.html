          const mm=(e)=>onMove(e.clientX,e.clientY);
          const tm=(e)=>{ if(e.touches[0]){ e.preventDefault(); onMove(e.touches[0].clientX,e.touches[0].clientY); } };
          const up=()=>{ document.removeEventListener("mousemove",mm); document.removeEventListener("mouseup",up); document.removeEventListener("touchmove",tm); document.removeEventListener("touchend",up); fabDragRef.current={moved}; };
          document.addEventListener("mousemove",mm); document.addEventListener("mouseup",up);
          document.addEventListener("touchmove",tm,{passive:false}); document.addEventListener("touchend",up);
        };
        return (
          <button
            onMouseDown={(e)=>{ e.preventDefault(); startDrag(e.clientX,e.clientY); }}
            onTouchStart={(e)=>{ if(e.touches[0]) startDrag(e.touches[0].clientX,e.touches[0].clientY); }}
            onClick={()=>{ if(!fabDragRef.current||!fabDragRef.current.moved){ setMsg(""); setModalAperto(true); } fabDragRef.current=null; }}
            title="Registra una nuova attività — trascinabile"
            style={{position:"fixed", left:32, bottom:32,
              transform:`translate(${(fabDrag?fabDrag.x:0)}px, ${(fabDrag?fabDrag.y:0)}px)`,
              width:68, height:68, borderRadius:"50%",
              background:"rgba(124,58,237,0.30)", backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)",
              border:"2px solid rgba(124,58,237,0.55)", color:"#fff",
              cursor:"grab", display:"flex", alignItems:"center", justifyContent:"center",
              boxShadow:"0 8px 28px rgba(124,58,237,0.45)", zIndex:1000, touchAction:"none", userSelect:"none"}}>
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="3" strokeLinecap="round"/></svg>
          </button>
        );
      })()}

      {/* MODAL INSERIMENTO ATTIVITÀ */}
      {modalAperto&&(
        <div onClick={()=>setModalAperto(false)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.55)",backdropFilter:"blur(3px)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,maxWidth:460,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.35)",overflow:"hidden",fontFamily:"'Montserrat',sans-serif"}}>
            <div style={{background:"linear-gradient(135deg,#a78bfa,#8b5cf6)",padding:"16px 22px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{color:"#fff",fontWeight:800,fontSize:17,display:"inline-flex",alignItems:"center",gap:8}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/></svg>
                Registra attività
              </span>
              <button onClick={()=>setModalAperto(false)} style={{background:"transparent",border:"none",color:"#fff",fontSize:22,cursor:"pointer",lineHeight:1,fontWeight:700}}>✕</button>
            </div>
            <div style={{padding:"22px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
                <div style={{gridColumn:"1 / -1"}}>
                  <label style={lbl}>Data produzione</label>
                  <input type="date" style={{...inp,width:"100%"}} value={data} onChange={e=>setData(e.target.value)}/>
                </div>
                <div>
                  <label style={lbl}>Brand</label>
                  <select style={{...inp,width:"100%",cursor:"pointer"}} value={brand} onChange={e=>setBrand(e.target.value)}>
                    <option value="">— scegli —</option>
                    {BRANDS.map(b=><option key={b} value={b}>{b}</option>)}
                  </select>
                </div>
                <div>
                  <label style={lbl}>Tempo lavorato [min]</label>
                  <input type="number" min="0" style={{...inp,width:"100%"}} placeholder="es. 480" value={tempo} onChange={e=>setTempo(e.target.value)}/>
                </div>
                <div>
                  <label style={lbl}>Tipologia</label>
                  <select style={{...inp,width:"100%",cursor:"pointer"}} value={tipologia} onChange={e=>setTipologia(e.target.value)}>
                    {!_isPrep&&<option value="">— scegli —</option>}
                    {TIPOLOGIE.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                {_isPrep&&(
                <div>
                  <label style={lbl}>N° Richiesta</label>
                  <input type="text" style={{...inp,width:"100%"}} placeholder="es. REQ-2026-001" value={nRichiesta} onChange={e=>setNRichiesta(e.target.value)}/>
                </div>
                )}
                {_mostraArticolo&&(
                <div>
                  <label style={lbl}>Articolo <span style={{color:"#94a3b8",fontWeight:600,textTransform:"none",letterSpacing:0}}>(facoltativo)</span></label>
                  <input type="text" style={{...inp,width:"100%"}} placeholder="es. AS1234.B56789.U0001" value={articolo} onChange={e=>setArticolo(e.target.value)}/>
                </div>
                )}
                {!_isPrep&&(
                <div>
                  <label style={lbl}>Reparto</label>
                  <select style={{...inp,width:"100%",cursor:"pointer"}} value={reparto} onChange={e=>setReparto(e.target.value)}>
                    <option value="">— scegli —</option>
                    {REPARTI.map(r=><option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
                )}
                {_mostraPellame&&(
                <div>
                  <label style={lbl}>Tipo di pellame</label>
                  <select style={{...inp,width:"100%",cursor:"pointer"}} value={pellame} onChange={e=>setPellame(e.target.value)}>
                    <option value="">— scegli —</option>
                    {PELLAMI.map(pl=><option key={pl} value={pl}>{pl}</option>)}
                  </select>
                </div>
                )}
              </div>
              {msg&&<div style={{fontSize:13,fontWeight:700,color:msg.includes("✓")?"#10b981":"#ef4444",marginBottom:12}}>{msg}</div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={salva} disabled={salvando} style={{flex:1,background:salvando?"#c4b5fd":"linear-gradient(135deg,#a78bfa,#8b5cf6)",color:"#fff",border:"none",borderRadius:10,padding:"12px 0",fontWeight:800,fontSize:15,cursor:salvando?"default":"pointer",fontFamily:"'Montserrat',sans-serif"}}>
                  {salvando?"Salvataggio...":"Registra"}
                </button>
                <button onClick={()=>setModalAperto(false)} style={{background:"#f1f5f9",color:"#475569",border:"none",borderRadius:10,padding:"12px 22px",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"'Montserrat',sans-serif"}}>Annulla</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TabOperatori({ operatori, sessioni, linee, isAdmin, lineaFiltro }) { const [,setTk] = useState(0);
  useEffect(()=>{ const t=setInterval(()=>setTk(x=>x+1),60000); return()=>clearInterval(t); },[]);
  const [filtro,setFiltro] = useState("tutti");
  const [cerca,setCerca]   = useState("");
  // Orari turno: standard (inizio/fine) e "solo oggi" (validi solo per la data corrente).
  // Letti dal localStorage, popolato da caricaOrariDaD1 (allineato a D1 ogni 60s).
  const _orariStdInizio = (()=>{ try{ return JSON.parse(localStorage.getItem('nexus_orari_turno')||'{}'); }catch(e){ return {}; } })();
  const _orariStdFine   = (()=>{ try{ return JSON.parse(localStorage.getItem('nexus_orari_fine_turno')||'{}'); }catch(e){ return {}; } })();
  const _orariOggi      = (()=>{ try{ return JSON.parse(localStorage.getItem('nexus_orari_oggi')||'{}'); }catch(e){ return {}; } })();
  const _oggiStr        = new Date().toLocaleDateString('it-IT');
  // Modal di modifica orario (standard o solo-oggi) apribile dai pulsantini sulle card.
  const [modOra, setModOra] = useState(null); // { op, tipo:'standard'|'oggi', inizio, fine }
  // Salvataggio STANDARD: aggiorna D1 e localStorage subito (così la card si aggiorna senza attendere il refresh 60s).
  const salvaStd = (matricola, inizio, fine) => {
    fetch(nexusUrl('salvaOrarioOperatore',{matricola,orarioInizio:inizio,orarioFine:fine}),{mode:'cors'}).catch(()=>{});
    try {
      const li = JSON.parse(localStorage.getItem('nexus_orari_turno')||'{}'); li[matricola]=inizio; localStorage.setItem('nexus_orari_turno', JSON.stringify(li));
      const lf = JSON.parse(localStorage.getItem('nexus_orari_fine_turno')||'{}'); lf[matricola]=fine; localStorage.setItem('nexus_orari_fine_turno', JSON.stringify(lf));
    } catch(e){}
    setTk(x=>x+1);
  };
  // Salvataggio SOLO OGGI: aggiorna D1 e localStorage subito.
  const salvaOggiOp = (matricola, inizioOggi, fineOggi) => {
    fetch(nexusUrl('salvaOrarioOggi',{matricola,orarioInizioOggi:inizioOggi,orarioFineOggi:fineOggi}),{mode:'cors'}).catch(()=>{});
    // Propaga l'orario alle sessioni gia' registrate oggi (Presenze), come in CheckIn.
    try {
      const op = (operatori||[]).find(o=>o.matricola===matricola);
      const chiave = op ? (op.nome.toUpperCase()+"-"+op.cognome.toUpperCase()) : null;
      const oggi0 = new Date(); oggi0.setHours(0,0,0,0);
      const hmToIso = (hm, base) => { if(!hm) return null; const [h,m]=hm.split(":").map(Number); const d=base?new Date(base):new Date(); d.setHours(h||0,m||0,0,0); return d.toISOString(); };
      (sessioni||[]).filter(s=>{
        if(s._pianificato) return false;
        const matchMat = s.matricola===matricola || (chiave && s.matricola===chiave);
        if(!matchMat) return false;
        const dI = parseData(s.inizio);
        return dI && dI.getTime() >= oggi0.getTime();
      }).forEach(s=>{
        const baseInizio = parseData(s.inizio) || new Date();
        if(inizioOggi){ const isoIn=hmToIso(inizioOggi,baseInizio); if(isoIn) fetch(nexusUrl('modificaorario',{sessionId:s.id,campo:"inizio",valore:isoIn}),{mode:'cors'}).catch(()=>{}); }
        const haCheckout = s.fine && s.fine!=="" && s.fine!==null && s.fine!=="null";
        if(fineOggi && haCheckout){ const baseFine=parseData(s.fine)||baseInizio; const isoFin=hmToIso(fineOggi,baseFine); if(isoFin) fetch(nexusUrl('modificaorario',{sessionId:s.id,campo:"fine",valore:isoFin}),{mode:'cors'}).catch(()=>{}); }
      });
      localStorage.setItem("nexus_ult_modifica_orario", String(Date.now()));
      fetch(nexusUrl('invalidaObiettivoCongelato',{}),{mode:'cors'}).catch(()=>{});
    } catch(e){}
    try {
      const lo = JSON.parse(localStorage.getItem('nexus_orari_oggi')||'{}');
      lo[matricola] = {inizioOggi, fineOggi, data:_oggiStr};
      localStorage.setItem('nexus_orari_oggi', JSON.stringify(lo));
    } catch(e){}
    setTk(x=>x+1);
  };
  const _statiAll = operatori.map(op => { const chiave = op.nome.toUpperCase()+"-"+op.cognome.toUpperCase();
    const sessAtt = sessioni.find(s => (s.matricola===chiave||s.matricola===op.matricola) && !s.fine && !s._pianificato);
    const ultimaSess = sessioni.filter(s => s.matricola===chiave||s.matricola===op.matricola).sort((a,b)=> (parseData(b.inizio)||0)-(parseData(a.inizio)||0))[0];
    return { op, sessAtt, ultimaSess }; });
  // VISIBILITÀ: l'admin vede tutti gli operatori; una linea vede SOLO chi oggi è (o è stato) su quella linea.
  const _oggi0Op = (()=>{ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); })();
  const _opSuLinea = (op) => {
    if (isAdmin || !lineaFiltro) return true;
    const chiave = op.nome.toUpperCase()+"-"+op.cognome.toUpperCase();
    return (sessioni||[]).some(s => {
      if (s._pianificato) return false;
      if (s.matricola!==chiave && s.matricola!==op.matricola) return false;
      const dI = parseData(s.inizio);
      if (!dI || dI.getTime() < _oggi0Op) return false;
      return s.lineaCorrente===lineaFiltro.id || s.lineaInizio===lineaFiltro.id;
    });
  };
  const stati = _statiAll.filter(s => _opSuLinea(s.op));
  const presenti = stati.filter(s=>s.sessAtt).length;
  const assenti  = stati.filter(s=>!s.sessAtt).length;
  const filtrati = stati.filter(s=>{ if(filtro==="presenti") return !!s.sessAtt; if(filtro==="assenti") return !s.sessAtt; return true; }).filter(s=>{ if(!cerca) return true; const q = cerca.toLowerCase(); return s.op.nome.toLowerCase().includes(q)||s.op.cognome.toLowerCase().includes(q)||s.op.matricola.toLowerCase().includes(q); });
  return (
    <div>
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:100}}>
          <div style={{fontSize:28,fontWeight:800,color:"#ffffff",lineHeight:1}}>{stati.length}</div>
          <div style={{fontSize:11,color:"#ffffff",marginTop:4,fontWeight:700}}>Totale</div>
        </div>
        <div style={{background:"#f8fafc",border:"1px solid #22c55e44",borderTop:"3px solid #22c55e",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:100}}>
          <div style={{fontSize:28,fontWeight:800,color:"#22c55e",lineHeight:1}}>{presenti}</div>
          <div style={{fontSize:13,color:"#1e293b",marginTop:4,fontWeight:600}}>Presenti</div>
        </div>
        <div style={{background:"#f8fafc",border:"1px solid #ef444444",borderTop:"3px solid #ef4444",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:100}}>
          <div style={{fontSize:28,fontWeight:800,color:"#ef4444",lineHeight:1}}>{assenti}</div>
          <div style={{fontSize:13,color:"#1e293b",marginTop:4,fontWeight:600}}>Assenti</div>
        </div>
      </div>
      <input style={{...S.inp,marginBottom:12}} placeholder="Cerca operatore..." value={cerca} onChange={e=>setCerca(e.target.value)}/>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["tutti","Tutti"],["presenti","● Presenti"],["assenti","○ Assenti"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)} style={{padding:"6px 14px",border:"1px solid "+(filtro===k?"#00d4aa":"#1e3a5f"),borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:filtro===k?"#00d4aa22":"transparent",color:filtro===k?"#00d4aa":"#64748b"}}>{l}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {filtrati.map(({op,sessAtt,ultimaSess})=>{ const presente = !!sessAtt; const linea = sessAtt ? getLinea(sessAtt.lineaCorrente,linee) : null;
          return (
            <div key={op.matricola} style={{background:presente?"#ffffff":"#f8fafc",border:"1px solid "+(presente?"#22c55e":"#e1e1e1"),borderLeft:"4px solid "+(presente?"#22c55e":"#e1e1e1"),borderRadius:12,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:presente?"#22c55e":"#cbd5e1",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{op.nome} {op.cognome}</div>
                  <div style={{fontSize:12,color:"#94a3b8"}}>{op.matricola}</div>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:presente?"#22c55e":"#475569",background:presente?"#22c55e18":"#e1e1e1",padding:"2px 8px",borderRadius:4}}>{presente?"IN TURNO":"ASSENTE"}</span>
              </div>
              {(()=>{
                // Orario standard dell'operatore (per matricola)
                const stdI = _orariStdInizio[op.matricola] || "";
                const stdF = _orariStdFine[op.matricola] || "";
                // Orario "solo oggi" (valido solo se data === oggi)
                const oggiOp = _orariOggi[op.matricola];
                const haOggi = oggiOp && oggiOp.data===_oggiStr && (oggiOp.inizioOggi || oggiOp.fineOggi);
                const oggiI = haOggi ? (oggiOp.inizioOggi||"") : "";
                const oggiF = haOggi ? (oggiOp.fineOggi||"") : "";
                if(!stdI && !stdF && !haOggi) {
                  // Nessun orario impostato: mostro comunque lo standard di default + i pulsanti di modifica
                  return (
                    <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                        <span style={{fontWeight:700,color:"#d97706",minWidth:62}}>Standard</span>
                        <span style={{color:"#d97706",fontWeight:700,background:"#fef9c3",padding:"1px 8px",borderRadius:4}}>06:00 – 14:00</span>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setModOra({op, tipo:"standard", inizio:"06:00", fine:"14:00"})} style={{flex:1,padding:"5px 8px",fontSize:11,fontWeight:700,border:"1px solid #7c3aed",borderRadius:6,background:"#7c3aed11",color:"#7c3aed",cursor:"pointer",fontFamily:"inherit"}}>✎ Standard</button>
                        <button onClick={()=>setModOra({op, tipo:"oggi", inizio:"06:00", fine:"14:00"})} style={{flex:1,padding:"5px 8px",fontSize:11,fontWeight:700,border:"1px solid #ff6937",borderRadius:6,background:"#ff693711",color:"#ff6937",cursor:"pointer",fontFamily:"inherit"}}>✎ Solo oggi</button>
                      </div>
                    </div>
                  );
                }
                return (
                  <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                      <span style={{fontWeight:700,color:"#d97706",minWidth:62}}>Standard</span>
                      <span style={{color:"#d97706",fontWeight:700,background:"#fef9c3",padding:"1px 8px",borderRadius:4}}>{(stdI||"06:00")} – {(stdF||"14:00")}</span>
                    </div>
                    {haOggi&&(
                      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                        <span style={{fontWeight:700,color:"#ff6937",minWidth:62}}>Solo oggi</span>
                        <span style={{color:"#ff6937",fontWeight:700,background:"#ffedd5",padding:"1px 8px",borderRadius:4}}>{(oggiI||stdI||"06:00")} – {(oggiF||stdF||"14:00")}</span>
                      </div>
                    )}
                    <div style={{display:"flex",gap:6,marginTop:2}}>
                      <button onClick={()=>setModOra({op, tipo:"standard", inizio:(stdI||"06:00"), fine:(stdF||"14:00")})} style={{flex:1,padding:"5px 8px",fontSize:11,fontWeight:700,border:"1px solid #7c3aed",borderRadius:6,background:"#7c3aed11",color:"#7c3aed",cursor:"pointer",fontFamily:"inherit"}}>✎ Standard</button>
                      <button onClick={()=>setModOra({op, tipo:"oggi", inizio:(oggiI||stdI||"06:00"), fine:(oggiF||stdF||"14:00")})} style={{flex:1,padding:"5px 8px",fontSize:11,fontWeight:700,border:"1px solid #ff6937",borderRadius:6,background:"#ff693711",color:"#ff6937",cursor:"pointer",fontFamily:"inherit"}}>✎ Solo oggi</button>
                    </div>
                  </div>
                );
              })()}
              {presente&&sessAtt&&(
                <div style={{background:"#f8fafc",borderRadius:8,padding:"8px 12px",fontSize:12}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}>
                    <span style={{color:linea.colore,fontWeight:600}}>{linea.id} — {linea.nome}</span>
                    <code style={S.sku}>{sessAtt.skuCorrente||sessAtt.sku}</code>
                    {sessAtt.rampaDal&&(()=>{
                      const gg = giorniLavorativiJS(sessAtt.rampaDal);
                      const durG = (sessAtt.rampaDurata && +sessAtt.rampaDurata>=2) ? +sessAtt.rampaDurata : 15;
                      if(gg>durG) return null;
                      return (
                        <span style={{display:"inline-flex",alignItems:"center",gap:6,background:"#ffffff",border:"2px solid #ff6937",borderRadius:8,padding:"4px 12px"}}>
                          <IconaRampa size={14} color="#ff6937"/>
                          <span style={{fontSize:12,fontWeight:800,color:"#ff6937",lineHeight:1}}>{gg}/{durG}</span>
                        </span>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          ); })}
      </div>
      {modOra&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
          <div style={{background:"#ffffff",borderRadius:16,padding:"32px 28px",width:"90%",maxWidth:420,boxShadow:"0 0 0 4px "+(modOra.tipo==="oggi"?"#ffc299":"#a78bfa")+", 0 0 40px 12px "+(modOra.tipo==="oggi"?"#ff693766":"#7c3aed66")}}>
            <div style={{fontSize:18,fontWeight:800,color:modOra.tipo==="oggi"?"#ff6937":"#7c3aed",marginBottom:4,fontFamily:"'Montserrat',sans-serif",display:"flex",alignItems:"center",gap:6}}><IconaMatita size={22}/> Modifica orario</div>
            <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:2}}>{modOra.op.nome} {modOra.op.cognome}</div>
            <div style={{fontSize:12,fontWeight:800,color:modOra.tipo==="oggi"?"#ff6937":"#7c3aed",marginBottom:18,letterSpacing:0.5}}>{modOra.tipo==="oggi"?"Solo Oggi":"Turno Standard"}</div>
            <div style={{fontSize:12,color:modOra.tipo==="oggi"?"#ff6937":"#7c3aed",marginBottom:6,letterSpacing:1,textTransform:"uppercase",fontWeight:800,textAlign:"center"}}>Inizio</div>
            <div style={{marginBottom:14,textAlign:"center"}}>
              <TimePicker value={modOra.inizio} color={modOra.tipo==="oggi"?"#ff6937":"#7c3aed"} onChange={v=>setModOra({...modOra,inizio:v})}/>
            </div>
            <div style={{fontSize:12,color:modOra.tipo==="oggi"?"#ff6937":"#7c3aed",marginBottom:6,letterSpacing:1,textTransform:"uppercase",fontWeight:800,textAlign:"center"}}>Fine</div>
            <div style={{marginBottom:18,textAlign:"center"}}>

function LogoSpinner({size=48}) {
  // Aumenta la dimensione di rendering del 40% per dare più spazio alla N
  const s = Math.round(size * 1.4);
  const ring = Math.max(3, Math.floor(s/18));
  const inset = Math.floor(s/10);
  const pad = 2;
  return (
    <div style={{position:"relative",width:s,height:s,flexShrink:0}}>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`${ring}px solid transparent`,borderTopColor:"#7c3aed",borderRightColor:"#a78bfa",animation:"spin 1s linear infinite",boxShadow:"0 0 10px 3px #7c3aed66"}}/>
      <div style={{position:"absolute",inset:Math.floor(inset/3),borderRadius:"50%",border:`${Math.max(2,ring-1)}px solid transparent`,borderBottomColor:"#6d28d9",borderLeftColor:"#c4b5fd",animation:"spin 1.5s linear infinite reverse"}}/>
      <div style={{position:"absolute",inset:inset,borderRadius:"50%",background:"linear-gradient(135deg,#ffffff,#f0f0f0,#e8e8e8,#f5f5f5)",boxShadow:"inset 2px 2px 6px rgba(0,0,0,0.1),0 0 0 2px #a78bfa",display:"flex",alignItems:"center",justifyContent:"center",padding:pad}}>
        <img src="logo_Nexus.png" style={{width:"100%",height:"100%",objectFit:"contain"}} alt="N"/>
      </div>
    </div>
  );
}

    api.evento({sessionId:s.id,matricola:s.matricola||"",nome:s.nome||"",cognome:s.cognome||"",sku:s.skuCorrente||s.sku||"",tipo:"CHECKOUT",lineaDa:s.lineaCorrente||"",lineaA:"",skuDa:s.skuCorrente||s.sku||"",skuA:""}); };
  const tr = (id,dest,nSku) => {
    const _dRep=(()=>{ const _o=(linee||[]).find(l=>l.id===dest); const _u=((dest||"")+" "+((_o&&_o.nome)||"")).toUpperCase(); return _u.includes("RMA")||_u.includes("PREPARAZIONE DG")||_u.includes("TAGLIO DG"); })();
    setSess(p=>p.map(s=>{ if(s.id!==id)return s; const sp=s.skuCorrente||s.sku; const sn=_dRep?"":(nSku||sp); api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:sn,tipo:"TRASFERIMENTO",lineaDa:s.lineaCorrente,lineaA:dest,skuDa:sp,skuA:sn}); return {...s,lineaCorrente:dest,skuCorrente:sn,trasferimenti:[...s.trasferimenti,{da:s.lineaCorrente,a:dest,skuDa:sp,skuA:sn,quando:now().toISOString()}]}; }));
    // Aggiorna anche sessSheets immediatamente per visualizzazione Dashboard
    setSessSheets(p=>p.map(s=>{ if(s.id!==id)return s; const sp=s.skuCorrente||s.sku; const sn=_dRep?"":(nSku||sp); return {...s,lineaCorrente:dest,skuCorrente:sn,trasferimenti:[...(s.trasferimenti||[]),{da:s.lineaCorrente,a:dest,skuDa:sp,skuA:sn,quando:new Date().toISOString()}]}; }));
    setTimeout(caricaSessioni,1000); };
  const rst = () => { setSess([]); api.reset(); setTimeout(caricaSessioni,1500); };
  const syncCfg = {ok:{c:"#22c55e",t:"Sheets connesso"},caricamento:{c:"#f59e0b",t:"Connessione..."},errore:{c:"#ef4444",t:"Sheets non raggiungibile"}}[sync]||{c:"#475569",t:"Offline"};
  const dashCfg = {ok:{c:"#22c55e",t:"● Live"},caricamento:{c:"#f59e0b",t:"⟳ Sync..."},errore:{c:"#ef4444",t:"● Errore"}}[dashSync]||{c:"#475569",t:""};

  // Modalità readonly - nessun login, accesso diretto
  if(URL_VIEW==="readonly") {
    if(sync==="caricamento") return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f2f5",flexDirection:"column",gap:16}}>
        <LogoSpinner size={96}/>
        <span style={{fontSize:36,fontWeight:800,color:"#7c3aed",letterSpacing:4,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
        <span style={{color:"#f59e0b",fontWeight:700,fontSize:15,fontFamily:"'Montserrat',sans-serif"}}>⟳ Caricamento...</span>
      </div>
    );
    return (
      <div style={{minHeight:"100vh",background:"#f0f2f5"}}>
        <div style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0",padding:"10px 20px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}} onClick={()=>setView("checkin")}>
            <LogoSpinner size={32}/>
            <span style={{fontSize:14,fontWeight:800,color:"#7c3aed",letterSpacing:2,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
          </div>
          <span style={{marginLeft:8,fontSize:12,background:"#f59e0b22",color:"#f59e0b",border:"1px solid #f59e0b44",borderRadius:6,padding:"2px 10px",fontWeight:700}}>👁 Sola lettura</span>
          {sync==="errore"&&<span style={{marginLeft:"auto",fontSize:12,fontWeight:800,color:"#ef4444",background:"#fee2e2",border:"1px solid #ef4444",borderRadius:6,padding:"3px 12px"}}>Errore</span>}
        </div>
        <Dashboard sessioni={sessSheets} setSessioni={setSessSheets} linee={linee} skuList={skuList} operatori={operatori} rampeSheets={rampeSheets} isAdmin={true} lineaFiltro={null} onReset={null} onCO={null} onCOSheets={null} onTr={null} onAggiornaSessioni={caricaSessioni} readOnly={true} editOrario={URL_VIEW==="admin"} onTornaIndietro={()=>setView("checkin")}/>
      </div>
    );
  }

  // Modalità admin da URL
  if(URL_VIEW==="admin") {
    if(!adminUnlocked) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f2f5"}}>
        <div style={{width:"100%",maxWidth:520,background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:20,padding:"52px 48px",animation:"fadeUp 0.4s ease",boxShadow:"0 0 0 4px #a78bfa, 0 0 40px 12px #7c3aed66",textAlign:"center"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,marginBottom:24}}>
            <LogoSpinner size={52}/>
            <span style={{fontSize:32,fontWeight:800,color:"#7c3aed",letterSpacing:3,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
          </div>
          <div style={{fontSize:13,color:"#64748b",marginBottom:16}}>Inserisci la password amministratore</div>
          <input type="password" style={{...S.inp,textAlign:"center",fontSize:18,letterSpacing:4,marginBottom:12,borderColor:"#7c3aed",borderWidth:2,background:"#f1f5f9",color:"#1e293b"}}
            placeholder="••••••••" value={adminPwd} onChange={e=>{setAdminPwd(e.target.value);setAdminPwdErr("");}}
            onKeyDown={e=>{ if(e.key==="Enter"){ if(adminPwd===ADMIN_PWD){setAdminUnlocked(true);setAccesso({ruolo:"admin",linea:null});} else {setAdminPwdErr("Password errata.");setAdminPwd("");} }}} autoFocus/>
          {adminPwdErr&&<div style={{...S.err,marginBottom:12}}>{adminPwdErr}</div>}
          <button style={{...S.bCI,background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"#ffffff"}} onClick={()=>{ if(adminPwd===ADMIN_PWD){setAdminUnlocked(true);setAccesso({ruolo:"admin",linea:null});} else {setAdminPwdErr("Password errata.");setAdminPwd("");} }}>Accedi</button>
        </div>
      </div>
    );
    // Admin sbloccato - continua con il render normale dell'app
  }

  // Schermata password per autologin da link diretto
  if(autologinLinea && !accesso) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f2f5"}}>
      <div style={{width:"100%",maxWidth:520,background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:20,padding:"52px 48px",animation:"fadeUp 0.4s ease",boxShadow:"0 0 0 4px #a78bfa, 0 0 40px 12px #7c3aed66",textAlign:"center"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,marginBottom:20}}>
          <LogoSpinner size={52}/>
          <span style={{fontSize:32,fontWeight:800,color:"#7c3aed",letterSpacing:3,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
        </div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:autologinLinea.colore||"#7c3aed"}}>{autologinLinea.id}</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Inserisci la password per accedere</div>
        <input type="password" style={{...S.inp,textAlign:"center",fontSize:18,letterSpacing:4,marginBottom:12,borderColor:autologinLinea.colore||"#7c3aed",borderWidth:2,background:"#f1f5f9",color:"#1e293b"}}
          placeholder="••••••••" value={autologinPwd}
          onChange={e=>{setAutologinPwd(e.target.value);setAutologinErr("");}}
          onKeyDown={e=>{ if(e.key==="Enter"){
            if(autologinPwd===autologinLinea.password||autologinPwd===ADMIN_PWD){
              setAutologinLoading(true);
              setTimeout(()=>{ setAccesso({ruolo:"linea",linea:autologinLinea}); setView("checkin"); setAutologinLinea(null); setAutologinPwd(""); setAutologinLoading(false); }, 800);
            } else { setAutologinErr("Password non corretta."); setAutologinPwd(""); }
          }}} autoFocus/>
        {autologinErr&&<div style={{...S.err,marginBottom:12}}>{autologinErr}</div>}
        <button style={{...S.bCI,background:"linear-gradient(135deg,"+(autologinLinea.colore||"#7c3aed")+","+(autologinLinea.colore||"#7c3aed")+"cc)",display:"flex",alignItems:"center",justifyContent:"center",gap:10}} onClick={()=>{
          if(autologinPwd===autologinLinea.password||autologinPwd===ADMIN_PWD){
            setAutologinLoading(true);
            setTimeout(()=>{ setAccesso({ruolo:"linea",linea:autologinLinea}); setView("checkin"); setAutologinLinea(null); setAutologinPwd(""); setAutologinLoading(false); }, 800);
          } else { setAutologinErr("Password non corretta."); setAutologinPwd(""); }
        }}>
          {autologinLoading
            ? <><div style={{width:20,height:20,border:"3px solid rgba(255,255,255,0.4)",borderTop:"3px solid #fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/> Accesso...</>
            : "Accedi"}
        </button>
      </div>
    </div>
  );

  // Qualità come overlay modale invece di pagina intera
  // I check viewQualita devono venire PRIMA del LoginDashboard condizionale,
  // altrimenti il return sotto cattura tutto e il click su "Qualità" non apre nulla.
  if(viewQualita==="login") return <LoginQualita linee={linee} sync={sync} onLogin={(l)=>{ setLineaQualita(l); setViewQualita("dashboard"); }} onBack={()=>setViewQualita(false)}/>;
  if(viewQualita==="dashboard"&&lineaQualita) return <DashboardQualita linea={lineaQualita} linee={linee} skuList={skuList} difettiList={difettiList} onEsci={()=>{ setLineaQualita(null); setViewQualita(false); setView("checkin"); }}/>;

  if(!accesso && view !== "login") {
    return <LoginDashboard linee={linee} sync={sync} onLogin={(ruolo,linea)=>{ setAccesso({ruolo,linea}); if(ruolo==="linea"&&linea) sessioneLinea.salva(linea.id); setView("checkin"); }} onQualita={()=>setViewQualita("login")} onQualitaAdmin={()=>{ setLineaQualita(null); setViewQualita("dashboard"); }}/>;
  }
  return (
    <div style={{minHeight:"100vh",background:"#f0f2f5",color:"#1e293b"}}>
      {sync==="errore"&&(
        <div style={{background:"#fee2e2",borderBottom:"1px solid #ef4444",padding:"8px 20px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:13,fontWeight:800,color:"#ef4444"}}>Errore</span>
        </div>
      )}
      {view!=="checkin"&&(
        <div style={{display:"flex",gap:8,padding:"12px 20px",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",alignItems:"center"}}>
          {view==="dashboard"&&(
            <span style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              {dashSync==="errore"&&<span style={{fontSize:12,fontWeight:800,color:"#ef4444",background:"#fee2e2",border:"1px solid #ef4444",borderRadius:6,padding:"3px 12px"}}>Errore</span>}
            </span>
          )}
        </div>
      )}
      {view==="checkin"&&(
        <CheckIn onSuccess={add} onCheckout={co} onTrasf={tr} sessioni={sess} sessSheets={sessSheets} coSheets={coFromSheets} aggiornaSessioni={()=>setTimeout(caricaSessioni,1000)} linee={linee} operatori={operatori} skuList={skuList} syncCfg={syncCfg} dashCfg={dashCfg} ultimoSync2={ultimoSync2} lineaFiltro={accesso&&accesso.ruolo==="linea"?accesso.linea:null} onGoToDashboard={()=>setView("dashboard")} onEsci={()=>{ sessioneLinea.pulisci(); setAccesso(null); setView("login"); }} rampeSheets={rampeSheets} onQualita={(l)=>{ setLineaQualita(l); setViewQualita("dashboard"); }}/>
      )}
      {view==="login"&&(
        <LoginDashboard linee={linee} sync={sync} onLogin={(ruolo,linea)=>{ setAccesso({ruolo,linea}); if(ruolo==="linea"&&linea) sessioneLinea.salva(linea.id); setView("checkin"); }} onQualita={()=>setViewQualita("login")} onQualitaAdmin={()=>{ setLineaQualita(null); setViewQualita("dashboard"); }}/>
      )}
      {view==="dashboard"&&accesso&&(
        <Dashboard
          sessioni={sessSheets}
          linee={linee} skuList={skuList} operatori={operatori}
          isAdmin={accesso.ruolo==="admin"}
          lineaFiltro={accesso.ruolo==="linea"?accesso.linea:null}
          onReset={rst} onCO={co} onCOSheets={coFromSheets} onTr={tr}
          onAggiornaSessioni={()=>setTimeout(caricaSessioni,3000)}
          rampeSheets={rampeSheets}
          editOrario={true}
          onTornaIndietro={()=>setView("checkin")}/>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
