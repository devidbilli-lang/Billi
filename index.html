<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwThQl9hcQtwpCmnmY7T05bSFEFNypHN2xHAZla9qoVA5_I5EyIsMjRn4i4FQifmdixGQ/exec";
const ADMIN_PWD = "Omega2026!";

const LINEE_DEFAULT = [
  { id:"L1", nome:"Linea 1 - Assemblaggio", colore:"#00d4aa", icona:"" },
  { id:"L2", nome:"Linea 2 - Saldatura",    colore:"#ff6b35", icona:"" },
  { id:"L3", nome:"Linea 3 - Verniciatura", colore:"#a855f7", icona:"" },
  { id:"L4", nome:"Linea 4 - Collaudo",     colore:"#3b82f6", icona:"" },
  { id:"L5", nome:"Linea 5 - Imballaggio",  colore:"#f59e0b", icona:"" },
];

const now     = () => new Date();
const fmt     = d => d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
const fmtFull = d => d.toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});

// Converte data italiana "dd/MM/yyyy HH:mm:ss" oppure ISO in oggetto Date
const parseData = s => {
  if(!s) return null;
  if(typeof s === "number") return new Date(s);
  const str = s.toString().trim();
  // Formato italiano: dd/MM/yyyy HH:mm:ss
  const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})[ ,]+(\d{2}):(\d{2})(?::(\d{2}))?/);
  if(m) return new Date(m[3],m[2]-1,m[1],m[4],m[5],m[6]||0);
  // ISO o altro formato
  const d = new Date(str);
  return isNaN(d)?null:d;
};
const fmtSafe = s => { const d=parseData(s); return d?fmtFull(d):"–"; };
const durataStr = ms => { if(!ms||ms<0) return "-"; const m=Math.floor(ms/60000),h=Math.floor(m/60); return h>0?(h+"h "+(m%60)+"m"):(m+"m"); };
const getLinea  = (id,linee) => linee.find(l=>l.id===id)||linee[0];
const store = {
  get:(k,d)=>{ try{ const v=sessionStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } },
  set:(k,v)=>{ try{ sessionStorage.setItem(k,JSON.stringify(v)); }catch{} }
};

// API Sheets
const api = {
  async config() {
    try { const r=await fetch(APPS_SCRIPT_URL+"?action=config"); const j=await r.json(); return j.ok?j.data:null; } catch{ return null; }
  },
  async evento(p) {
    try {
      const q=new URLSearchParams({action:"evento",sessionId:p.sessionId||"",matricola:p.matricola||"",nome:p.nome||"",cognome:p.cognome||"",sku:p.sku||"",tipo:p.tipo||"",lineaDa:p.lineaDa||"",lineaA:p.lineaA||"",skuDa:p.skuDa||"",skuA:p.skuA||""});
      await fetch(APPS_SCRIPT_URL+"?"+q.toString());
    } catch(e){ console.warn(e); }
  },
  async reset(){ try{ await fetch(APPS_SCRIPT_URL+"?action=reset"); }catch{} }
};

// Hook Sheets
function useSheets() {
  const [linee,setLinee]         = useState(LINEE_DEFAULT);
  const [operatori,setOperatori] = useState([]);
  const [skuList,setSkuList]     = useState([]);
  const [sync,setSync]           = useState("caricamento");
  const [ts,setTs]               = useState(null);
  const load = useCallback(async()=>{
    setSync("caricamento");
    try {
      const d = await api.config();
      if(d){
        if(d.linee&&d.linee.length) setLinee(d.linee);
        if(d.operatori) setOperatori(d.operatori);
        if(d.skuList)   setSkuList(d.skuList);
        setSync("ok"); setTs(new Date());
      } else setSync("errore");
    } catch{ setSync("errore"); }
  },[]);
  useEffect(()=>{ load(); },[load]);
  return { linee, operatori, skuList, sync, ts, reload:load };
}

// Calcola tappe (linea+sku+ms)
function tappe(s) {
  const fine = s.fine ? new Date(s.fine) : now();
  const out  = [];
  let cur    = new Date(s.inizio);
  let lc     = s.lineaCorrente;
  let sc     = s.skuCorrente||s.sku||"";
  const tr   = s.trasferimenti||[];
  if(!tr.length){
    out.push({linea:lc,sku:sc,ms:fine-cur});
  } else {
    const p0 = new Date(tr[0].quando);
    out.push({linea:tr[0].da,sku:tr[0].skuDa||sc,ms:p0-cur});
    cur=p0;
    for(let i=0;i<tr.length;i++){
      const t=tr[i], ft=i+1<tr.length?new Date(tr[i+1].quando):fine;
      out.push({linea:t.a,sku:t.skuA||t.skuDa||sc,ms:ft-cur});
      cur=ft;
    }
  }
  return out;
}

// Stili
const S = {

  hdr:  {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 24px",borderBottom:"1px solid #1e3a5f"},

  bCI:  {width:"100%",padding:14,background:"linear-gradient(135deg,#00d4aa,#0891b2)",border:"none",borderRadius:10,color:"#050a14",fontWeight:800,fontSize:16,cursor:"pointer",fontFamily:"'Montserrat',sans-serif"},
  bCO:  {width:"100%",padding:14,background:"linear-gradient(135deg,#ef4444,#b91c1c)",border:"none",borderRadius:10,color:"white",fontWeight:800,fontSize:16,cursor:"pointer",fontFamily:"'Montserrat',sans-serif",marginBottom:10},
  bBk:  {padding:"10px 28px",background:"transparent",border:"1px solid #1e3a5f",borderRadius:8,color:"#94a3b8",cursor:"pointer",fontFamily:"'Montserrat',sans-serif",fontSize:14},
  sku:  {background:"#f59e0b18",color:"#f59e0b",border:"1px solid #f59e0b44",padding:"2px 10px",borderRadius:4,fontSize:12,fontFamily:"monospace"},
  tag:  {padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,border:"1px solid",display:"inline-block"},
  td:   {padding:"10px 14px",fontSize:13,color:"#cbd5e1",whiteSpace:"nowrap"},
  sc:   {background:"#050a14",border:"1px solid #1e3a5f",borderRadius:10,padding:"14px 16px",marginBottom:16},
};
const MS = {
  ov: {position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000},
  md: {background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:18,width:"90%",maxWidth:460,overflow:"hidden",animation:"fadeUp 0.3s ease"},
  mh: {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px",borderBottom:"1px solid #1e3a5f"},
  mt: {fontWeight:700,fontSize:16,color:"#a855f7"},
  mx: {background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:18,fontFamily:"'Montserrat',sans-serif"},
  an: {flex:1,padding:10,background:"transparent",border:"1px solid #1e3a5f",borderRadius:8,color:"#64748b",cursor:"pointer",fontFamily:"'Montserrat',sans-serif"},
  cf: {flex:2,padding:10,background:"linear-gradient(135deg,#a855f7,#7c3aed)",border:"none",borderRadius:8,color:"white",fontWeight:700,fontFamily:"'Montserrat',sans-serif",cursor:"pointer"},
};

// Suggerimenti operatori
function SugOp({ val, list, onSel }) {
  if(!val||val.length<2||!list.length) return null;
  const v=val.toUpperCase();
  const m=list.filter(o=>o.matricola.includes(v)||o.nome.toUpperCase().includes(v)||o.cognome.toUpperCase().includes(v)).slice(0,4);
  if(!m.length) return null;
  return (
    <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:8,marginTop:4,overflow:"hidden"}}>
      {m.map(o=>(
        <div key={o.matricola} onClick={()=>onSel(o)} style={{padding:"8px 14px",cursor:"pointer",borderBottom:"1px solid #0f1f38",display:"flex",gap:10,alignItems:"center"}}
          onMouseEnter={e=>e.currentTarget.style.background="#1e3a5f"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <span style={{fontSize:13,color:"#94a3b8"}}>{o.nome} {o.cognome}</span>
        </div>
      ))}
    </div>
  );
}

// Suggerimenti SKU
function SugSku({ val, list, onSel }) {
  if(!val||val.length<1||!list||!list.length) return null;
  const v=val.toUpperCase();
  const m=list.filter(s=>s.sku.includes(v)||s.descrizione.toUpperCase().includes(v)).slice(0,5);
  if(!m.length) return null;
  return (
    <div style={{background:"#0a1628",border:"1px solid #f59e0b44",borderRadius:8,marginTop:4,overflow:"hidden"}}>
      {m.map(s=>(
        <div key={s.sku} onClick={()=>onSel(s)} style={{padding:"8px 14px",cursor:"pointer",borderBottom:"1px solid #0f1f38",display:"flex",gap:10,alignItems:"center"}}
          onMouseEnter={e=>e.currentTarget.style.background="#1e3a5f"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <code style={S.sku}>{s.sku}</code>
          <span style={{fontSize:12,color:"#94a3b8"}}>{s.descrizione}</span>
        </div>
      ))}
    </div>
  );
}

// Cambio SKU inline (stessa linea)
function CambioSkuInline({ sess, skuList, onOk, onClose }) {
  const [nSku,setNSku]   = useState(sess.skuCorrente||sess.sku||"");
  const [cSku,setCSku]   = useState("");

  return (
    <div style={MS.ov}>
      <div style={{...MS.md, maxWidth:380}}>
        <div style={MS.mh}><span style={{...MS.mt,color:"#f59e0b"}}>📦 Cambio SKU</span><button style={MS.mx} onClick={onClose}>X</button></div>
        <div style={{padding:22}}>
          <div style={S.sc}>
            <div style={{fontSize:10,letterSpacing:2,color:"#f59e0b",textTransform:"uppercase",marginBottom:4}}>Operatore</div>
            <div style={{fontWeight:700,fontSize:15,color:"#f1f5f9",marginBottom:6}}>{sess.nome} {sess.cognome}</div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <code style={S.sku}>Attuale: {sess.skuCorrente||sess.sku||"-"}</code>

            </div>
          </div>
          <label style={S.lbl}>Nuovo SKU</label>
          {skuList.length>0&&(
            <div style={{marginBottom:8}}>
              <input style={{...S.inp,borderColor:"#f59e0b",borderWidth:2}} placeholder="Cerca SKU o descrizione..."

            value={nSku} onChange={e=>{setNSku(e.target.value.toUpperCase());setErr("");}}/>

            <button style={MS.an} onClick={onClose}>Annulla</button>

              if(!nSku.trim()){setErr("Inserisci lo SKU.");return;}
              if(nSku.trim()===( sess.skuCorrente||sess.sku)){setErr("SKU identico a quello attuale.");return;}

}

// ─── Modal Password Generico ─────────────────────────────────────────────
function ModalPwd({ titolo, colore, onOk, onClose }) {
  const [pwd,setPwd] = useState("");
  const [err,setErr] = useState("");
  return (
    <div style={MS.ov}>
      <div style={{...MS.md,maxWidth:360}}>
        <div style={MS.mh}>
          <span style={{...MS.mt,color:colore||"#a855f7"}}>🔒 {titolo||"Password richiesta"}</span>
          <button style={MS.mx} onClick={onClose}>X</button>
        </div>
        <div style={{padding:22}}>
          <input type="password" style={S.inp} placeholder="Inserisci password..." autoFocus
            value={pwd} onChange={e=>{setPwd(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&onOk(pwd,setErr)}/>
          {err&&<div style={{...S.err,marginTop:8}}>{err}</div>}
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button style={MS.an} onClick={onClose}>Annulla</button>
            <button style={{...MS.cf,background:"linear-gradient(135deg,"+(colore||"#a855f7")+","+(colore||"#7c3aed")+")"}}
              onClick={()=>onOk(pwd,setErr)}>Conferma</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Modal Trasferimento
function ModalTrasf({ sess, linee, skuList, onOk, onClose }) {
  const [dest,setDest]   = useState(null);
  const [chSku,setChSku] = useState(false);
  const [nSku,setNSku]   = useState("");
  const [cSku,setCSku]   = useState("");
  const [pwd,setPwd]     = useState("");
  const [errPwd,setErrPwd] = useState("");
  const [fase,setFase]   = useState("scelta"); // "scelta" | "password"
  const la = getLinea(sess.lineaCorrente,linee);
  const lineaDest = dest ? getLinea(dest,linee) : null;

  const conferma = () => {
    // Se la linea destinazione ha password, chiedi prima
    if(lineaDest && lineaDest.password) {
      if(pwd !== lineaDest.password){ setErrPwd("Password errata."); setPwd(""); return; }
    }
    onOk(dest, chSku&&nSku?nSku:null);
  };

  return (
    <div style={MS.ov}>
      <div style={MS.md}>
        <div style={MS.mh}><span style={MS.mt}>Trasferimento</span><button style={MS.mx} onClick={onClose}>X</button></div>
        <div style={{padding:22,maxHeight:"80vh",overflowY:"auto"}}>

          {/* Info operatore */}
          <div style={S.sc}>
            <div style={{fontWeight:700,fontSize:15,color:"#f1f5f9",marginBottom:6}}>{sess.nome} {sess.cognome}</div>
            <code style={S.sku}>{sess.skuCorrente||sess.sku||"-"}</code>
            <span style={{...S.tag,background:la.colore+"22",color:la.colore,borderColor:la.colore+"44",marginLeft:8}}>{la.id} — {la.nome}</span>
          </div>

          {/* Selezione linea destinazione */}
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#64748b",marginBottom:8}}>Linea destinazione</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {linee.filter(l=>l.id!==sess.lineaCorrente).map(l=>(
              <button key={l.id} onClick={()=>{setDest(l.id);setPwd("");setErrPwd("");}}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"12px 8px",
                  border:"1px solid "+(dest===l.id?l.colore:"#1e3a5f"),borderRadius:10,cursor:"pointer",
                  background:dest===l.id?(l.colore+"22"):"rgba(255,255,255,0.03)",
                  boxShadow:dest===l.id?("0 0 16px "+l.colore+"44"):"none",
                  fontFamily:"'Montserrat',sans-serif",transition:"all 0.2s"}}>
                <span style={{fontSize:13,fontWeight:700,color:dest===l.id?l.colore:"#94a3b8"}}>{l.id}</span>
                <span style={{fontSize:10,color:dest===l.id?l.colore:"#64748b",textAlign:"center",lineHeight:1.3}}>{l.nome}</span>
                {l.password&&<span style={{fontSize:9,color:"#f59e0b",marginTop:2}}>🔒 con password</span>}
              </button>
            ))}
          </div>

          {/* Cambio SKU — prima della password */}
          <div style={{background:"#050a14",border:"1px solid #1e3a5f",borderRadius:8,padding:"12px 14px",marginBottom:16}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#94a3b8"}}>
              <input type="checkbox" checked={chSku} onChange={e=>setChSku(e.target.checked)} style={{accentColor:"#00d4aa",width:16,height:16}}/>
              Cambia anche SKU
            </label>
            {chSku&&(
              <div style={{marginTop:10}}>
                <label style={S.lbl}>Cerca nuovo SKU</label>
                <input style={{...S.inp,borderColor:"#f59e0b44"}} placeholder="Cerca SKU..." value={cSku} onChange={e=>setCSku(e.target.value.toUpperCase())}/>
                <SugSku val={cSku} list={skuList} onSel={s=>{setNSku(s.sku);setCSku("");}}/>
                <input style={{...S.inp,marginTop:8,fontFamily:"monospace"}} placeholder="SKU selezionato" value={nSku} onChange={e=>setNSku(e.target.value.toUpperCase())}/>
              </div>
            )}
          </div>

          {/* Password linea destinazione */}
          {dest&&lineaDest&&lineaDest.password&&(
            <div style={{background:"#050a14",border:"1px solid #f59e0b44",borderRadius:10,padding:14,marginBottom:16}}>
              <div style={{fontSize:12,color:"#f59e0b",fontWeight:600,marginBottom:8}}>
                🔒 {lineaDest.id} richiede la password
              </div>
              <input type="password" style={{...S.inp,borderColor:"#f59e0b44"}}
                placeholder="Password linea destinazione..."
                value={pwd} onChange={e=>{setPwd(e.target.value);setErrPwd("");}}
                onKeyDown={e=>e.key==="Enter"&&conferma()}/>
              {errPwd&&<div style={{...S.err,marginTop:8}}>{errPwd}</div>}
            </div>
          )}

          <div style={{display:"flex",gap:10}}>
            <button style={MS.an} onClick={onClose}>Annulla</button>
            <button style={{...MS.cf,opacity:dest?1:0.4}} disabled={!dest} onClick={conferma}>Conferma</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Riepilogo linea
function RiepLinea({ sessioni, linee }) {
  const gmap = {};
  for(const s of sessioni){ for(const {linea,ms} of tappe(s)) gmap[linea]=(gmap[linea]||0)+ms; }
  const tot = Object.values(gmap).reduce((a,b)=>a+b,0);
  if(!tot) return <div style={{textAlign:"center",padding:40,color:"#475569"}}>Nessun dato</div>;
  return (
    <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:"18px 20px",marginBottom:12}}>
      <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#00d4aa",marginBottom:14}}>Minuti per Linea</div>
      {linee.map(l=>{ const ms=gmap[l.id]||0; if(!ms) return null; const pct=tot>0?(ms/tot)*100:0;
        return (<div key={l.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{color:l.colore,fontWeight:700,minWidth:32,fontSize:13}}>{l.id}</span>
          
          <div style={{flex:1,height:10,background:"#0f1f38",borderRadius:6,overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:l.colore,borderRadius:6,transition:"width 0.6s"}}/>
          </div>
          <span style={{color:l.colore,minWidth:42,fontSize:13,fontWeight:700,fontFamily:"monospace",textAlign:"right"}}>{Math.round(ms/60000)}m</span>
          <span style={{minWidth:34,fontSize:11,color:"#475569",textAlign:"right"}}>{pct.toFixed(0)+"%"}</span>
        </div>);
      })}
      <div style={{marginTop:12,fontSize:12,color:"#64748b",borderTop:"1px solid #1e3a5f",paddingTop:10}}>Totale: <strong style={{color:"#00d4aa"}}>{durataStr(tot)}</strong></div>
    </div>
  );
}

// Riepilogo SKU
function RiepSku({ sessioni, linee }) {
  const totMap = {};
  const linMap = {};
  for(const s of sessioni){
    for(const {linea,sku,ms} of tappe(s)){
      if(!sku) continue;
      totMap[sku]=(totMap[sku]||0)+ms;
      if(!linMap[sku]) linMap[sku]={};
      linMap[sku][linea]=(linMap[sku][linea]||0)+ms;
    }
  }
  const keys = Object.keys(totMap).sort();
  if(!keys.length) return <div style={{textAlign:"center",padding:40,color:"#475569"}}>Nessun dato</div>;
  const totG = Object.values(totMap).reduce((a,b)=>a+b,0);
  return (
    <div style={{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:"18px 20px",marginBottom:12}}>
      <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#f59e0b",marginBottom:14}}>Minuti per SKU</div>
      {keys.map(sku=>{ const ms=totMap[sku]; const pct=totG>0?(ms/totG)*100:0; const lm=linMap[sku]||{};
        return (<div key={sku} style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid #0f1f38"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <code style={{...S.sku,minWidth:80}}>{sku}</code>
            <div style={{flex:1,height:10,background:"#0f1f38",borderRadius:6,overflow:"hidden"}}>
              <div style={{height:"100%",width:pct+"%",background:"#f59e0b",borderRadius:6,transition:"width 0.6s"}}/>
            </div>
            <span style={{color:"#f59e0b",minWidth:42,fontSize:13,fontWeight:700,fontFamily:"monospace",textAlign:"right"}}>{Math.round(ms/60000)}m</span>
            <span style={{minWidth:34,fontSize:11,color:"#475569",textAlign:"right"}}>{pct.toFixed(0)+"%"}</span>
          </div>
          <div style={{paddingLeft:16,display:"flex",flexWrap:"wrap",gap:6}}>
            {linee.map(l=>{ const mL=lm[l.id]||0; if(!mL) return null;
              return <span key={l.id} style={{fontSize:11,background:l.colore+"18",color:l.colore,border:"1px solid "+l.colore+"44",borderRadius:4,padding:"2px 8px",fontFamily:"monospace"}}>{l.id}: {Math.round(mL/60000)}m</span>;
            })}
          </div>
        </div>);
      })}
      <div style={{fontSize:12,color:"#64748b",paddingTop:4}}>Totale: <strong style={{color:"#f59e0b"}}>{durataStr(totG)}</strong></div>
    </div>
  );
}

// CheckIn

          <h2 style={{fontSize:24,fontWeight:800,marginBottom:8,color:cfg.c}}>{cfg.t}</h2>

            {/* Info sessione trovata */}
            {sf&&(

      </div>
    );

// Dashboard
// ─── Tab Operatori ───────────────────────────────────────────────────────
function TabOperatori({ operatori, sessioni, linee }) {
  const [,setTk] = useState(0);
  useEffect(()=>{ const t=setInterval(()=>setTk(x=>x+1),30000); return()=>clearInterval(t); },[]);
  const [filtro,setFiltro] = useState("tutti"); // tutti | presenti | assenti
  const [cerca,setCerca]   = useState("");

  // Per ogni operatore trova la sessione attiva
  const stati = operatori.map(op => {
    const chiave = op.nome.toUpperCase()+"-"+op.cognome.toUpperCase();
    const sessAtt = sessioni.find(s =>
      (s.matricola===chiave||s.matricola===op.matricola) && !s.fine
    );
    const ultimaSess = sessioni.filter(s =>
      s.matricola===chiave||s.matricola===op.matricola
    ).sort((a,b)=> (parseData(b.inizio)||0)-(parseData(a.inizio)||0))[0];
    return { op, sessAtt, ultimaSess };
  });

  const presenti = stati.filter(s=>s.sessAtt).length;
  const assenti  = stati.filter(s=>!s.sessAtt).length;

  const filtrati = stati.filter(s=>{
    if(filtro==="presenti") return !!s.sessAtt;
    if(filtro==="assenti")  return !s.sessAtt;
    return true;
  }).filter(s=>{
    if(!cerca) return true;
    const q = cerca.toLowerCase();
    return s.op.nome.toLowerCase().includes(q) ||
           s.op.cognome.toLowerCase().includes(q) ||
           s.op.matricola.toLowerCase().includes(q);
  });

  return (
    <div>
      {/* KPI */}
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{background:"#f59e0b",border:"1px solid #f59e0b",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:100}}>
          <div style={{fontSize:28,fontWeight:800,color:"#000",lineHeight:1}}>{operatori.length}</div>
          <div style={{fontSize:11,color:"#000",marginTop:4,fontWeight:700}}>Totale</div>
        </div>
        <div style={{background:"#0a1628",border:"1px solid #22c55e44",borderTop:"3px solid #22c55e",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:100}}>
          <div style={{fontSize:28,fontWeight:800,color:"#22c55e",lineHeight:1}}>{presenti}</div>
          <div style={{fontSize:11,color:"#475569",marginTop:4}}>Presenti</div>
        </div>
        <div style={{background:"#0a1628",border:"1px solid #ef444444",borderTop:"3px solid #ef4444",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:100}}>
          <div style={{fontSize:28,fontWeight:800,color:"#ef4444",lineHeight:1}}>{assenti}</div>
          <div style={{fontSize:11,color:"#475569",marginTop:4}}>Assenti</div>
        </div>
      </div>

      {/* Campo ricerca */}
      <input style={{...S.inp,marginBottom:12}} placeholder="Cerca operatore per nome, cognome o matricola..."
        value={cerca} onChange={e=>setCerca(e.target.value)}/>

      {/* Filtri */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["tutti","Tutti"],["presenti","● Presenti"],["assenti","○ Assenti"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"6px 14px",border:"1px solid "+(filtro===k?"#00d4aa":"#1e3a5f"),borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:filtro===k?"#00d4aa22":"transparent",color:filtro===k?"#00d4aa":"#64748b"}}>{l}
          </button>
        ))}
      </div>

      {/* Lista operatori */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {filtrati.map(({op,sessAtt,ultimaSess})=>{
          const presente = !!sessAtt;
          const linea = sessAtt ? getLinea(sessAtt.lineaCorrente,linee) : null;
          return (
            <div key={op.matricola} style={{background:"#0a1628",border:"1px solid "+(presente?"#22c55e44":"#1e3a5f"),borderLeft:"4px solid "+(presente?"#22c55e":"#334155"),borderRadius:12,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:presente?"#22c55e":"#475569",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>{op.nome} {op.cognome}</div>
                  <div style={{fontSize:11,color:"#475569"}}>{op.matricola}</div>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:presente?"#22c55e":"#475569",background:presente?"#22c55e18":"#1e3a5f",padding:"2px 8px",borderRadius:4}}>
                  {presente?"IN TURNO":"ASSENTE"}
                </span>
              </div>
              {presente&&sessAtt&&(
                <div style={{background:"#050a14",borderRadius:8,padding:"8px 12px",fontSize:12}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{color:linea.colore,fontWeight:600}}>{linea.id} — {linea.nome}</span>
                    <code style={S.sku}>{sessAtt.skuCorrente||sessAtt.sku}</code>
                  </div>
                  <div style={{color:"#475569",marginTop:4}}>
                    Inizio: {fmtSafe(sessAtt.inizio)}
                    {sessAtt.trasferimenti&&sessAtt.trasferimenti.length>0&&
                      <span style={{marginLeft:8,color:"#a855f7"}}>{sessAtt.trasferimenti.length} trasf.</span>
                    }
                  </div>
                </div>
              )}
              {!presente&&ultimaSess&&(
                <div style={{fontSize:11,color:"#334155",marginTop:4}}>
                  Ultimo turno: {fmtSafe(ultimaSess.inizio)}
                  {ultimaSess.fine&&<span> → {fmtSafe(ultimaSess.fine)}</span>}
                </div>
              )}
            </div>
          );
        })}
        {filtrati.length===0&&(
          <div style={{gridColumn:"1/-1",textAlign:"center",padding:40,color:"#475569"}}>Nessun operatore trovato</div>
        )}
      </div>
    </div>
  );
}

function LoginDashboard({ linee, onLogin }) {
  const [pwd,setPwd] = useState("");
  const [err,setErr] = useState("");
  const tenta = () => {
    if(pwd===ADMIN_PWD){ onLogin("admin",null); return; }
    const l=linee.find(l=>l.password&&l.password===pwd);
    if(l){ onLogin("linea",l); return; }
    setErr("Password non riconosciuta."); setPwd("");
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#050a14,#0a1628)"}}>
      <div style={{width:"100%",maxWidth:400,background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:16,padding:"36px 32px",textAlign:"center",animation:"fadeUp 0.4s ease"}}>
        <div style={{fontSize:32,fontWeight:800,color:"#e879f9",letterSpacing:3,marginBottom:8,fontFamily:"'Montserrat',sans-serif"}}>OMEGA</div>
        <div style={{fontSize:15,fontWeight:700,color:"#00d4aa",marginBottom:20}}>ProductionTrack — Dashboard</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:16}}>Password admin o password della tua linea</div>
        <input type="password" style={{...S.inp,textAlign:"center",fontSize:18,letterSpacing:4,marginBottom:12,borderColor:"#e879f9",borderWidth:2}}
          placeholder="••••••••" value={pwd}
          onChange={e=>{setPwd(e.target.value);setErr("");}}
          onKeyDown={e=>e.key==="Enter"&&tenta()} autoFocus/>
        {err&&<div style={{...S.err,marginBottom:12}}>{err}</div>}
        <button style={S.bCI} onClick={tenta}>Accedi</button>
      </div>
    </div>
  );
}

    setDashSync("caricamento");
    try {
      const r = await fetch(APPS_SCRIPT_URL+"?action=sessioni");
      const j = await r.json();
      if(j.ok&&j.data.sessioni){ setSessSheets(j.data.sessioni); setDashSync("ok"); setUltimoSync2(new Date()); }
      else setDashSync("errore");
    } catch(e){ setDashSync("errore"); }
  },[]);

  // Carica sessioni subito all'avvio e ogni minuto (indipendentemente dalla view)
  useEffect(()=>{
    caricaSessioni();
    const t = setInterval(caricaSessioni, 60000);
    return ()=>clearInterval(t);
  },[caricaSessioni]);

  const add = s => {
    setSess(p=>[s,...p]);
    api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:s.sku,tipo:"CHECKIN",lineaDa:s.lineaCorrente,lineaA:s.lineaCorrente,skuDa:s.sku,skuA:s.sku});
  };
  const co = id => {
    setSess(p=>p.map(s=>{ if(s.id!==id)return s; api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:s.skuCorrente||s.sku,tipo:"CHECKOUT",lineaDa:s.lineaCorrente,lineaA:"",skuDa:s.skuCorrente||s.sku,skuA:""}); return {...s,fine:now().toISOString()}; }));
    setTimeout(caricaSessioni,3000);
  };
  // Chiude una sessione che viene da Sheets (non in sess locale)
  const coFromSheets = s => {
    api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:s.skuCorrente||s.sku||"",tipo:"CHECKOUT",lineaDa:s.lineaCorrente,lineaA:"",skuDa:s.skuCorrente||s.sku||"",skuA:""});
  };
  const tr = (id,dest,nSku) => {
    setSess(p=>p.map(s=>{ if(s.id!==id)return s; const sp=s.skuCorrente||s.sku; const sn=nSku||sp; api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:sn,tipo:"TRASFERIMENTO",lineaDa:s.lineaCorrente,lineaA:dest,skuDa:sp,skuA:sn}); return {...s,lineaCorrente:dest,skuCorrente:sn,trasferimenti:[...s.trasferimenti,{da:s.lineaCorrente,a:dest,skuDa:sp,skuA:sn,quando:now().toISOString()}]}; }));
    setTimeout(caricaSessioni,3000);
  };
  const rst = () => { setSess([]); api.reset(); setTimeout(caricaSessioni,3000); };

  const syncCfg = {ok:{c:"#22c55e",t:"Sheets connesso"},caricamento:{c:"#f59e0b",t:"Connessione..."},errore:{c:"#ef4444",t:"Sheets non raggiungibile"}}[sync]||{c:"#475569",t:"Offline"};
  const dashCfg = {ok:{c:"#22c55e",t:"● Live"},caricamento:{c:"#f59e0b",t:"⟳ Sync..."},errore:{c:"#ef4444",t:"● Errore"}}[dashSync]||{c:"#475569",t:""};

  return (
    <div style={{minHeight:"100vh",background:"#050a14",color:"#e2e8f0"}}>
      <div style={{background:"#0a1628",borderBottom:"1px solid #1e3a5f",padding:"5px 20px",display:"flex",alignItems:"center",gap:12,fontSize:11}}>
        <span style={{color:syncCfg.c,fontWeight:700}}>{syncCfg.t}</span>
        {sync==="ok"&&<span style={{color:"#475569"}}>· {linee.length} linee · {operatori.length} operatori · {skuList.length} SKU · {ts?fmt(ts):"-"}</span>}
        {(sync==="ok"||sync==="errore")&&<button onClick={reload} style={{background:"transparent",border:"1px solid #1e3a5f",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:11,padding:"2px 8px",fontFamily:"'Montserrat',sans-serif"}}>Ricarica</button>}
      </div>
      {view!=="checkin"&&(
        <div style={{display:"flex",gap:8,padding:"12px 20px",background:"#0a1628",borderBottom:"1px solid #1e3a5f",alignItems:"center"}}>
          {[["dashboard","Dashboard"],["checkin","Check-in"]].map(([v,l])=>(
            <button key={v} onClick={()=>{ if(v==="dashboard"&&!accesso){setAccesso(null);} setView(v); }} style={{padding:"6px 16px",background:view===v?"#00d4aa22":"transparent",border:"1px solid "+(view===v?"#00d4aa":"#1e3a5f"),borderRadius:6,color:view===v?"#00d4aa":"#64748b",cursor:"pointer",fontFamily:"'Montserrat',sans-serif"}}>{l}</button>
          ))}
          {view==="dashboard"&&accesso&&(
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,fontWeight:700,color:accesso.ruolo==="admin"?"#00d4aa":"#e879f9"}}>
                {accesso.ruolo==="admin"?"👑 Admin":<span style={{color:accesso.linea.colore,fontWeight:700}}>{"🔒 "+accesso.linea.id}</span>}
              </span>
              <button onClick={()=>{setAccesso(null);setView("checkin");}} style={{background:"transparent",border:"1px solid #ef444466",borderRadius:4,color:"#ef4444",cursor:"pointer",fontSize:11,padding:"2px 10px",fontFamily:"'Montserrat',sans-serif"}}>Esci</button>
            </div>
          )}
          {view==="dashboard"&&(
            <span style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:dashCfg.c,fontWeight:700}}>{dashCfg.t}</span>
              {ultimoSync2&&<span style={{fontSize:10,color:"#475569"}}>Aggiornato: {fmt(ultimoSync2)}</span>}
              <button onClick={caricaSessioni} style={{background:"transparent",border:"1px solid #1e3a5f",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:11,padding:"2px 8px",fontFamily:"'Montserrat',sans-serif"}}>↻</button>
            </span>
          )}
        </div>
      )}
      {view==="checkin"&&(
        <div>
          <CheckIn onSuccess={add} onCheckout={co} onTrasf={tr} sessioni={sess} sessSheets={sessSheets} coSheets={coFromSheets} aggiornaSessioni={()=>setTimeout(caricaSessioni,3000)} linee={linee} operatori={operatori} skuList={skuList} syncCfg={syncCfg} dashCfg={dashCfg} ultimoSync2={ultimoSync2}/>
          <div style={{display:"flex",justifyContent:"center",padding:16}}>
            <button style={{background:"transparent",border:"1px solid #1e3a5f",borderRadius:8,color:"#475569",fontSize:12,padding:"8px 20px",cursor:"pointer",fontFamily:"'Montserrat',sans-serif"}} onClick={()=>{setAccesso(null);setView("dashboard");}}>Dashboard</button>
          </div>
        </div>
      )}
      {view==="dashboard"&&!accesso&&(
        <LoginDashboard linee={linee} onLogin={(ruolo,linea)=>setAccesso({ruolo,linea})}/>
      )}
      {view==="dashboard"&&accesso&&(
        <Dashboard
          sessioni={accesso.ruolo==="linea"
            ? sessSheets.filter(s=>s.lineaCorrente===accesso.linea.id||s.lineaInizio===accesso.linea.id)
            : sessSheets}
          linee={linee} skuList={skuList} operatori={operatori}
          isAdmin={accesso.ruolo==="admin"}
          lineaFiltro={accesso.ruolo==="linea"?accesso.linea:null}
          onReset={rst} onCO={co} onCOSheets={coFromSheets} onTr={tr}
          onAggiornaSessioni={()=>setTimeout(caricaSessioni,3000)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
