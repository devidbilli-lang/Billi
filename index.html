// Calcola la data di Pasqua (calendario gregoriano) per un dato anno. Restituisce un oggetto Date.
function calcolaPasquaJS(anno) {
  var a = anno % 19;
  var b = Math.floor(anno / 100);
  var c = anno % 100;
  var d = Math.floor(b / 4);
  var e = b % 4;
  var f = Math.floor((b + 8) / 25);
  var g = Math.floor((b - f + 1) / 3);
  var h = (19 * a + b - d - g + 15) % 30;
  var i = Math.floor(c / 4);
  var k = c % 4;
  var l = (32 + 2 * e + 2 * i - h - k) % 7;
  var m = Math.floor((a + 11 * h + 22 * l) / 451);
  var mese = Math.floor((h + l - 7 * m + 114) / 31);
  var giorno = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(anno, mese - 1, giorno);
}
// Verifica se una data è una festività nazionale italiana (fisse + Pasqua + Pasquetta).
function isFestivitaJS(data) {
  var g = data.getDate();
  var m = data.getMonth() + 1;
  var anno = data.getFullYear();
  var fisse = [[1,1],[6,1],[25,4],[1,5],[2,6],[15,8],[1,11],[8,12],[25,12],[26,12]];
  for (var i = 0; i < fisse.length; i++) {
    if (g === fisse[i][0] && m === fisse[i][1]) return true;
  }
  var pasqua = calcolaPasquaJS(anno); pasqua.setHours(0,0,0,0);
  var pasquetta = new Date(pasqua); pasquetta.setDate(pasquetta.getDate() + 1);
  var dData = new Date(data); dData.setHours(0,0,0,0);
  if (dData.getTime() === pasqua.getTime() || dData.getTime() === pasquetta.getTime()) return true;
  return false;
}
function giorniLavorativiJS(tsInizio) {
  if(!tsInizio) return 1;
  var cur = new Date(tsInizio); cur.setHours(0,0,0,0);
  var oggi = new Date(); oggi.setHours(0,0,0,0);
  var gg = 0;
  while(cur.getTime() <= oggi.getTime()) {
    var dow = cur.getDay();
    if(dow !== 0 && dow !== 6 && !isFestivitaJS(cur)) gg++;
    cur.setDate(cur.getDate()+1);
  }
  return Math.min(15, Math.max(1, gg));
}
// Curva di rampa teorica: percentuale dell'obiettivo a pieno regime per ciascuno dei 15 giorni lavorativi.
const PERC_RAMPA = [0,20,35,45,55,64,73,76,82,85,88,92,95,98,100];
// Percentuale di rampa per il giorno indicato, ricampionando la curva PERC_RAMPA su `durata`
// giorni totali: giorno 1 -> 0%, giorno `durata` -> 100%, mantenendo la forma della curva.
function rampaPerc(giorno, durata){
  const N0 = PERC_RAMPA.length; // 15 punti di riferimento
  const D = (durata && durata >= 2) ? durata : 15;
  if(giorno <= 1) return PERC_RAMPA[0];      // primo giorno
  if(giorno >= D) return 100;                // ultimo giorno = 100%
  const pos = (giorno - 1) / (D - 1) * (N0 - 1); // posizione 0..14 nella curva originale
  const i = Math.floor(pos), f = pos - i;
  const a = PERC_RAMPA[i] || 0;
  const b = PERC_RAMPA[Math.min(i + 1, N0 - 1)] || 0;
  return a + (b - a) * f;
}

async function fetchConRetry(url, tentativi=8, delayMs=800) {
  for (let i = 0; i < tentativi; i++) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 25000);
      const r = await fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(tid));
      if (r.ok) return r;
    } catch(e) {
      if (i < tentativi - 1) {
        await new Promise(res => setTimeout(res, delayMs * (i + 1)));
      }
    }
  }
  throw new Error('Richiesta fallita dopo ' + tentativi + ' tentativi');
}

const CODA_KEY = "nexus_coda_eventi";

function codaChiave(p) {
  const giorno = new Date().toISOString().slice(0,10);
  // CORSO e RIENTRO possono avvenire più volte — aggiungi timestamp per renderli unici
  const tipiMultipli = ["CORSO","RIENTRO"];
  const extra = tipiMultipli.includes((p.tipo||"").toUpperCase()) ? "|"+Date.now() : "";
  return (p.matricola||"")+"|"+(p.sku||"")+"|"+(p.tipo||"")+"|"+(p.lineaDa||"")+"|"+giorno+extra;
}

function codaAggiungi(evento) {
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    const chiave = codaChiave(evento);
    if(coda.find(e=>e.chiave===chiave)) return; // già in coda
    coda.push({...evento, chiave, ts:Date.now(), tentativi:0});
    localStorage.setItem(CODA_KEY,JSON.stringify(coda));
  } catch(e) {}
}

function codaRimuovi(chiave) {
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    localStorage.setItem(CODA_KEY,JSON.stringify(coda.filter(e=>e.chiave!==chiave)));
  } catch(e) {}
}

async function inviaEvento(p) {
  const url = nexusUrl("evento",{sessionId:p.sessionId||"",matricola:p.matricola||"",nome:p.nome||"",cognome:p.cognome||"",sku:p.sku||"",tipo:p.tipo||"",lineaDa:p.lineaDa||"",lineaA:p.lineaA||"",skuDa:p.skuDa||"",skuA:p.skuA||"",trasf:p.trasf||""});
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(),12000);
  const r = await fetch(url,{mode:"cors",signal:ctrl.signal}).finally(()=>clearTimeout(tid));
  if(r&&r.ok){
    return true;
  }
  return false;
}

async function codaProcessa() {
  if(_codaAttiva) return;
  _codaAttiva = true;
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    if(!coda.length){ _codaAttiva=false; return; }
    console.log("[CODA] "+coda.length+" eventi in sospeso...");
    const nuova = [];
    for(const ev of coda){
      try {
        const ok = await inviaEvento(ev);
        if(ok){
          console.log("[CODA] ✓", ev.chiave);
        } else {
          ev.tentativi++;
          nuova.push(ev);
          await new Promise(r=>setTimeout(r,1000));
        }

        ev.tentativi++;

  _codaAttiva = false;
}

// TimePicker custom: 2 input HH/MM in stile Montserrat viola chiaro.
// Props: value (string "HH:MM"), onChange (callback con nuovo "HH:MM"), size (compact|normal)
function TimePicker({ value, onChange, size, color }) {
  const [h, m] = (value||"").split(":");
  const hh = h||"00";
  const mm = m||"00";
  const compact = size === "compact";
  const col = color || "#7c3aed";
  const colBordo = color || "#a78bfa";
  const inputW = compact ? 40 : 80;
  const fontS = compact ? 13 : 24;
  const padV = compact ? 4 : 10;
  const update = (newHh, newMm) => { if(onChange) onChange(newHh+":"+newMm); };
  const onChangeH = e => {
    let v = e.target.value.replace(/\D/g,"").slice(0,2);
    if(v!==""){ const n = Math.min(23,Math.max(0,parseInt(v,10))); v = String(n).padStart(v.length>=2?2:1,"0"); }
    update(v, mm);
  };
  const onBlurH = e => { const v=e.target.value; const nv = v===""?"00":String(Math.min(23,Math.max(0,parseInt(v,10)||0))).padStart(2,"0"); update(nv, mm); };
  const onChangeM = e => {
    let v = e.target.value.replace(/\D/g,"").slice(0,2);
    if(v!==""){ const n = Math.min(59,Math.max(0,parseInt(v,10))); v = String(n).padStart(v.length>=2?2:1,"0"); }
    update(hh, v);
  };
  const onBlurM = e => { const v=e.target.value; const nv = v===""?"00":String(Math.min(59,Math.max(0,parseInt(v,10)||0))).padStart(2,"0"); update(hh, nv); };
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:compact?4:8,fontFamily:"'Montserrat',sans-serif"}}>
      <input type="number" min="0" max="23" inputMode="numeric" className="tp-num"
        style={{width:inputW,textAlign:"center",fontSize:fontS,fontWeight:800,padding:padV+"px 4px",background:"#f8fafc",border:"1.5px solid "+colBordo,borderRadius:8,color:"#1e293b",fontFamily:"'Montserrat',sans-serif",outline:"none"}}
        value={hh} onChange={onChangeH} onBlur={onBlurH} onFocus={e=>e.target.select()} placeholder="HH"/>
      <span style={{fontSize:compact?15:28,fontWeight:800,color:col}}>:</span>
      <input type="number" min="0" max="59" inputMode="numeric" className="tp-num"
        style={{width:inputW,textAlign:"center",fontSize:fontS,fontWeight:800,padding:padV+"px 4px",background:"#f8fafc",border:"1.5px solid "+colBordo,borderRadius:8,color:"#1e293b",fontFamily:"'Montserrat',sans-serif",outline:"none"}}
        value={mm} onChange={onChangeM} onBlur={onBlurM} onFocus={e=>e.target.select()} placeholder="MM"/>
    </div>
  );
}
// DatePicker custom: 3 input GG/MM/AAAA in stile Montserrat viola chiaro.
// Props: value (string "YYYY-MM-DD"), onChange (callback con nuovo "YYYY-MM-DD"), size
// Verifica che una stringa "YYYY-MM-DD" rappresenti una data valida del calendario
// e sia entro un range ragionevole (±1 anno da oggi).
// Ritorna {valida:boolean, messaggio:string}
function dataValida(str) {
  if (!str || !/^\d{4}-\d{2}-\d{2}$/.test(str)) return {valida:false, messaggio:"Data non valida (GG/MM/AAAA)"};
  const [y,m,g] = str.split("-").map(n=>parseInt(n,10));
  if (m<1||m>12) return {valida:false, messaggio:"Mese non valido (1-12)"};
  if (g<1||g>31) return {valida:false, messaggio:"Giorno non valido (1-31)"};
  // Controllo giorno-mese reale (es. 31/02 non valido)
  const d = new Date(y, m-1, g);
  if (d.getFullYear()!==y || d.getMonth()!==m-1 || d.getDate()!==g) {
    return {valida:false, messaggio:`Il ${g}/${m}/${y} non esiste`};
  }
  // Range ±1 anno da oggi
  const oggi = new Date();
  const limiteMin = new Date(oggi.getFullYear()-1, oggi.getMonth(), oggi.getDate());
  const limiteMax = new Date(oggi.getFullYear()+1, oggi.getMonth(), oggi.getDate());
  if (d < limiteMin) return {valida:false, messaggio:"Data troppo nel passato (max 1 anno fa)"};
  if (d > limiteMax) return {valida:false, messaggio:"Data troppo nel futuro (max 1 anno avanti)"};
  return {valida:true, messaggio:""};
}

function DatePicker({ value, onChange, size }) {
  const v = value || "";
  let initYY="", initMO="", initGG="";
  if (v.length === 10 && v.includes("-")) { const [y,m,g] = v.split("-"); initYY=y; initMO=m; initGG=g; }
  // State locale per consentire editing libero (cancellare, digitare cifre intermedie, etc.)
  const [ggL, setGgL] = React.useState(initGG);
  const [moL, setMoL] = React.useState(initMO);
  const [yyL, setYyL] = React.useState(initYY);
  // Sincronizza state locale con prop value quando cambia da fuori
  React.useEffect(()=>{
    if (v.length === 10 && v.includes("-")) {
      const [y,m,g] = v.split("-");
      setYyL(y); setMoL(m); setGgL(g);
    }
  }, [v]);
  const compact = size === "compact";
  const wGG = compact ? 50 : 64;
  const wAA = compact ? 80 : 96;
  const fontS = compact ? 16 : 22;
  const padV = compact ? 6 : 10;
  const emitChange = (nGg, nMo, nYy) => {
    if (onChange && nGg && nMo && nYy && nYy.length===4) {
      onChange(nYy+"-"+nMo+"-"+nGg);
    }
  };
  // Durante l'editing: accetta cifre, non normalizza (per non rompere la digitazione)
  const onChangeG = e => { const nv = e.target.value.replace(/\D/g,"").slice(0,2); setGgL(nv); };
  const onChangeM = e => { const nv = e.target.value.replace(/\D/g,"").slice(0,2); setMoL(nv); };
  const onChangeY = e => { const nv = e.target.value.replace(/\D/g,"").slice(0,4); setYyL(nv); };
  // Al blur: normalizza con padding e clamp ai limiti
  const onBlurG = () => {
    let n = parseInt(ggL,10);
    if (isNaN(n)||n<1) n=1; if (n>31) n=31;
    const fin = String(n).padStart(2,"0");
    setGgL(fin); emitChange(fin, moL.padStart(2,"0"), yyL);
  };
  const onBlurM = () => {
    let n = parseInt(moL,10);
    if (isNaN(n)||n<1) n=1; if (n>12) n=12;
    const fin = String(n).padStart(2,"0");
    setMoL(fin); emitChange(ggL.padStart(2,"0"), fin, yyL);
  };
  const onBlurY = () => {
    let n = parseInt(yyL,10);
    if (isNaN(n)||n<2020||n>2099) n = new Date().getFullYear();
    const fin = String(n);
    setYyL(fin); emitChange(ggL.padStart(2,"0"), moL.padStart(2,"0"), fin);
  };
  const inpStyle = { textAlign:"center", fontSize:fontS, fontWeight:800, padding:padV+"px 4px", background:"#f8fafc", border:"1.5px solid #a78bfa", borderRadius:8, color:"#1e293b", fontFamily:"'Montserrat',sans-serif", outline:"none" };
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:compact?4:6,fontFamily:"'Montserrat',sans-serif"}}>
      <input type="text" inputMode="numeric" maxLength={2}
        style={{...inpStyle, width:wGG}}
        value={ggL} onChange={onChangeG} onBlur={onBlurG} onFocus={e=>e.target.select()} placeholder="GG"/>
      <span style={{fontSize:compact?18:22,fontWeight:800,color:"#7c3aed"}}>/</span>
      <input type="text" inputMode="numeric" maxLength={2}
        style={{...inpStyle, width:wGG}}
        value={moL} onChange={onChangeM} onBlur={onBlurM} onFocus={e=>e.target.select()} placeholder="MM"/>
      <span style={{fontSize:compact?18:22,fontWeight:800,color:"#7c3aed"}}>/</span>
      <input type="text" inputMode="numeric" maxLength={4}
        style={{...inpStyle, width:wAA}}
        value={yyL} onChange={onChangeY} onBlur={onBlurY} onFocus={e=>e.target.select()} placeholder="AAAA"/>
    </div>
  );
}

// ── INIZIO REALE DI UNA SESSIONE ──────────────────────────────────────────────
// Le sessioni di un articolo AGGIUNTO a metà giornata (id "ADD_<mat>_<sku>_<ts>")
// nascono con inizio = inizio turno (06:xx), ma in realtà sono iniziate all'ORA in cui
// l'articolo è stato aggiunto (il <ts> finale dell'id, in ms). Questo serve a distinguere
// articoli lavorati IN PARALLELO (stesso inizio) da quelli lavorati IN SEQUENZA (uno dopo
// l'altro), che NON vanno divisi tra loro. Per le sessioni normali si usa tsInizio/inizio.
function tsInizioRealeSessione(s){
  const id = (s && s.id) ? String(s.id) : "";
  if(id.indexOf("ADD_")===0){
    const m = id.match(/_(\d{10,})$/);
    if(m){ const t = Number(m[1]); if(t>0) return t; }
  }
  if(s && s.tsInizio && s.tsInizio>0) return Number(s.tsInizio);
  const d = parseData(s && s.inizio); return d ? d.getTime() : null;
}
// ── RIPARTIZIONE MINUTI PER PERIODO ───────────────────────────────────────────
// Ripartisce l'intervallo [dalMs, alMs] (un segmento di lavoro su un articolo) contando,
// istante per istante, quanti articoli della stessa persona sono REALMENTE attivi in
// parallelo (dagli intervalli reali). Restituisce i MILLISECONDI attribuiti all'articolo:
//  - articoli simultanei  → ogni segmento diviso per il n° di articoli in quel momento;
//  - articoli sequenziali → ciascuno conta il proprio periodo per intero (divisore 1).
function ripartisciMsPerPeriodo(dalMs, alMs, intervalli){
  if(!(alMs>dalMs)) return 0;
  const punti = new Set([dalMs, alMs]);
  for(const iv of intervalli){ if(!(iv.al>iv.dal)) continue; if(iv.dal>dalMs&&iv.dal<alMs) punti.add(iv.dal); if(iv.al>dalMs&&iv.al<alMs) punti.add(iv.al); }
  const ord = [...punti].sort((a,b)=>a-b);
  let totMs = 0;
  for(let i=0;i<ord.length-1;i++){
    const a=ord[i], b=ord[i+1], mid=(a+b)/2;
    let k=0; for(const iv of intervalli){ if(iv.al>iv.dal && iv.dal<=mid && mid<iv.al) k++; }
    if(k<1) k=1;
    totMs += (b-a)/k;
  }
  return totMs;
}

// Aggrega le note difetti (array di stringhe tipo "Difetto (Npz) | Altro (Mpz)") sommando le
// quantità per tipologia. Ritorna [[difetto, totale], ...] ordinato per quantità decrescente.
// I pezzi senza "(Npz)" (difetto senza quantità) vengono inclusi con totale 0.
function aggregaDifetti(note){
  const agg = {};
  (note||[]).forEach(n=>{
    String(n||"").split("|").forEach(pezzo=>{
      const t = pezzo.trim(); if(!t) return;
      const m = t.match(/^(.+?)\s*\(\s*(\d+)\s*pz\s*\)\s*$/i);
      if(m){ const d=m[1].trim(); if(d) agg[d]=(agg[d]||0)+(Number(m[2])||0); }
      else { if(!(t in agg)) agg[t]=0; }
    });
  });
  return Object.entries(agg).sort((a,b)=>b[1]-a[1]);
}
// Stepper numerico con frecce VIOLA grandi e ben cliccabili. Lo spinner nativo non è ricolorabile,
// quindi lo nascondo (classe .nviola-inp) e affianco due bottoni ▲▼. Inoltra tutti i prop dell'input
// (value, onChange, style, min/max, placeholder, ...); rispetta flex/width dello style originale.
function NumViola({ value, onChange, style={}, ...rest }){
  const _n = (value===""||value==null) ? 0 : (Number(value)||0);

  const _max = rest.max!=null ? Number(rest.max) : null;
  const _set = (d)=>{ let n=_n+d; if(_min!=null) n=Math.max(_min,n); if(_max!=null) n=Math.min(_max,n); onChange && onChange({target:{value:String(n)}}); };
  const _wrap = {position:"relative", display:"flex", alignItems:"center"};
  if(style.flex!=null) _wrap.flex = style.flex;
  if(style.width!=null) _wrap.width = style.width; else if(style.flex==null) _wrap.width = "100%";
  const _inp = {...style}; delete _inp.flex; delete _inp.width;
  const _bc = style.borderColor || "#7c3aed";
  const _col = (typeof _bc==="string" && _bc.length===9 && _bc[0]==="#") ? _bc.slice(0,7) : _bc; // frecce = colore del bordo del campo (alpha rimossa per visibilità)
  const _colBg = (typeof _col==="string" && _col.length===7 && _col[0]==="#") ? _col+"1f" : "transparent";
  const _btn = {flex:1,minHeight:0,padding:0,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",border:"1.5px solid "+_col,background:_colBg,color:_col,borderRadius:5,cursor:"pointer",fontSize:13,fontWeight:900,lineHeight:1,fontFamily:"inherit",userSelect:"none",touchAction:"manipulation"};
  return (
    <div style={_wrap}>
      <input value={value} onChange={onChange} {...rest} type="number" className={"nviola-inp"+(rest.className?(" "+rest.className):"")} style={{..._inp, width:"100%", paddingRight:40}}/>

      </div>
    </div>
  );
}

function ObiettivoProduzione({ sessioni:_sessioni, lineaId, skuList:_skuList, borseOggi, borseKO, borseMigl, maxOpOggi, minutiPresenzaLinea=0, coloreLinea, qualitaPerSku={}, linee=[], compatto=false, onObiettiviArticoli }) {

  // Carica straordinario da Sheets al montaggio

      if(!rd && (s.skuA||"").includes("__RAMPA__")){ const pp=(s.skuA||"").split("__RAMPA__"); const dd=new Date(pp[1]); if(!isNaN(dd)) rd=dd.getTime(); }

  // Obiettivo di linea AGGREGATO con rampa: somma degli obiettivi (ridotti se in rampa) di tutti

  const sommaObiettiviArticoli = (finoAMs)=>{

  // Mappa {sku: obiettivo giornaliero} per articolo sulla linea: stessi valori delle carte,
  // salvati su D1 per essere mostrati identici nel riquadro OGGI della tab Qualità.
  const mappaObiettiviArticoli = (finoAMs)=>{
    const skuSet = new Set();
    for(const s of sessioni){
      if(s._pianificato) continue;
      if(s.lineaCorrente!==lineaId && s.lineaInizio!==lineaId) continue;
      const sk = s.skuCorrente||s.sku||"";
      if(!sk || isSkuSpeciale(sk)) continue;
      skuSet.add(sk);
    }
    const m = {};

  // Minuti di permanenza totali degli operatori sulla linea (= tempo disponibile), sommando i

  // dall'efficienza RMA come denominatore. finoAMs=adesso → fin qui; null → fino a fine turno.
  const sommaMinutiDisponibili = (finoAMs)=>{
    const skuSet = new Set();

      if(s._pianificato) continue;
      if(s.lineaCorrente!==lineaId && s.lineaInizio!==lineaId) continue;
      const sk = s.skuCorrente||s.sku||"";
      if(!sk || isSkuSpeciale(sk)) continue;
      skuSet.add(sk);
    }

  // MINUTI REALMENTE LAVORATI sulla linea = presenza FISICA degli operatori sulla linea, al netto di
  // corso/pausa. Ogni operatore è contato UNA sola volta: se lavora più articoli in parallelo (più
  // sessioni nello stesso istante) la sua presenza NON si somma due volte — si fondono gli intervalli.
  // È il tempo davvero lavorato, indipendente dall'obiettivo (NON è obiettivo×TC). A turno chiuso
  // coincide col minuti_lav del worker/Riepilogo; in tempo reale conta la presenza fino ad adesso.
  const minutiLavReali = ()=>{
    const _oggi0 = new Date(); _oggi0.setHours(0,0,0,0);
    const _nowMs = Date.now();
    const perMat = {}; // matricola -> {pres:[[dal,al]], susp:[[dal,al]]}
    (sessioni||[]).forEach(s=>{
      if(s._pianificato) return;
      const dIni = tsInizioRealeSessione(s); if(!dIni) return;
      const g0 = new Date(dIni); g0.setHours(0,0,0,0); if(g0.getTime() < _oggi0.getTime()) return;
      const mat = s.matricola||s.nome; if(!mat) return;

      const haCk = s.fine && s.fine!=="" && s.fine!==null && s.fine!=="null";
      const dF = haCk ? parseData(s.fine) : null;
      const finReale = dF ? dF.getTime() : _nowMs;
      // Presenza sulla linea: segmenti [in,out] su QUESTA linea (gestendo i trasferimenti), fine reale.
      const trasf = (s.trasferimenti||[]).filter(t=>t.ts).sort((a,b)=>a.ts-b.ts);
      let cur=dIni, curL=s.lineaInizio||s.lineaCorrente;
      for(const t of trasf){ if(curL===lineaId && t.ts>cur) perMat[mat].pres.push([cur, Math.min(t.ts,finReale)]); cur=t.ts; curL=t.a||curL; }
      if(curL===lineaId && finReale>cur) perMat[mat].pres.push([cur, finReale]);
      // Sospensioni reali (corso/pausa): NON sono tempo lavorato.
      (s.corsi||[]).forEach(c=>{ const q=parseData(c.quando); if(!q) return; const r=c.rientro?parseData(c.rientro):null; const a=q.getTime(), b=r?r.getTime():finReale; if(b>a) perMat[mat].susp.push([a,b]); });
      (s.pause||[]).forEach(p=>{ const q=parseData(p.quando); if(!q) return; const r=p.ripresa?parseData(p.ripresa):null; const a=q.getTime(), b=r?r.getTime():finReale; if(b>a) perMat[mat].susp.push([a,b]); });
    });
    const _fondi = (ivs)=>{ if(!ivs.length) return []; ivs.sort((a,b)=>a[0]-b[0]); const out=[[ivs[0][0],ivs[0][1]]]; for(let i=1;i<ivs.length;i++){ const L=out[out.length-1]; if(ivs[i][0]<=L[1]) L[1]=Math.max(L[1],ivs[i][1]); else out.push([ivs[i][0],ivs[i][1]]); } return out; };
    let tot = 0;
    Object.values(perMat).forEach(({pres, susp})=>{
      const P=_fondi(pres), S=_fondi(susp);
      let presMs=0; for(const iv of P) presMs += (iv[1]-iv[0]);
      let sospMs=0; for(const sv of S){ for(const pv of P){ const lo=Math.max(sv[0],pv[0]), hi=Math.min(sv[1],pv[1]); if(hi>lo) sospMs += (hi-lo); } }

  // linea giusta (gestendo i trasferimenti). A turno terminato e' questo il denominatore dell'efficienza:
  // conta il tempo PIANIFICATO (chi entra in ritardo o esce prima e' conteggiato sul pianificato; lo
  // straordinario oltre la fine pianificata non conta). Se mancano gli orari pianificati ripiega sui reali.
  const minutiPianificati = ()=>{
    const _hmTs = (hm, refTs)=>{ const _pp=(hm||"").split(":"); const d=new Date(refTs); d.setHours(parseInt(_pp[0])||0, parseInt(_pp[1])||0, 0, 0); return d.getTime(); };
    const _oggi0 = new Date(); _oggi0.setHours(0,0,0,0);
    const _nowMs = Date.now();
    const perMat = {};
    (sessioni||[]).forEach(s=>{
      if(s._pianificato) return;
      const dIni = tsInizioRealeSessione(s); if(!dIni) return;
      const g0 = new Date(dIni); g0.setHours(0,0,0,0); if(g0.getTime() < _oggi0.getTime()) return;

      const trasf = (s.trasferimenti||[]).filter(t=>t.ts).sort((a,b)=>a.ts-b.ts);
      let cur=plIni, curL=s.lineaInizio||s.lineaCorrente;
      for(const t of trasf){ const cut=Math.min(Math.max(t.ts,plIni),plFin); if(curL===lineaId && cut>cur) perMat[mat].pres.push([cur,cut]); cur=cut; curL=t.a||curL; }
      if(curL===lineaId && plFin>cur) perMat[mat].pres.push([cur, plFin]);
      (s.corsi||[]).forEach(c=>{ const q=parseData(c.quando); if(!q) return; const r=c.rientro?parseData(c.rientro):null; const a=Math.max(q.getTime(),plIni), b=Math.min(r?r.getTime():plFin, plFin); if(b>a) perMat[mat].susp.push([a,b]); });
      (s.pause||[]).forEach(pp=>{ const q=parseData(pp.quando); if(!q) return; const r=pp.ripresa?parseData(pp.ripresa):null; const a=Math.max(q.getTime(),plIni), b=Math.min(r?r.getTime():plFin, plFin); if(b>a) perMat[mat].susp.push([a,b]); });
    });
    const _fondi = (ivs)=>{ if(!ivs.length) return []; ivs.sort((a,b)=>a[0]-b[0]); const out=[[ivs[0][0],ivs[0][1]]]; for(let i=1;i<ivs.length;i++){ const L=out[out.length-1]; if(ivs[i][0]<=L[1]) L[1]=Math.max(L[1],ivs[i][1]); else out.push([ivs[i][0],ivs[i][1]]); } return out; };
    let tot = 0;
    Object.values(perMat).forEach(({pres, susp})=>{

  };
  // Obiettivo GIORNALIERO aggregato (somma articoli fino a fine turno, rampe incluse).

  // Obiettivo ATTESO A QUEST'ORA (real-time): somma articoli fino ad ADESSO. Un articolo

  const obAttesoRealTime = sommaObiettiviArticoli(Date.now());
  // OBIETTIVO GIORNALIERO da MOSTRARE/CONGELARE: la somma per articolo (con la finestra di

  const obDaCongelare = (obFinaleConRampa!=null) ? obFinaleConRampa : obFinale;
  // Mappa obiettivi per articolo (giornaliero) salvata insieme al totale, per il riquadro OGGI.
  const obPerArticoloJson = JSON.stringify(mappaObiettiviArticoli(null)||{});
  // MIRROR DIRETTO: riporta al genitore la mappa obiettivi per articolo GIORNALIERA appena cambia,

  React.useEffect(()=>{
    if(typeof onObiettiviArticoli==="function"){
      try{ onObiettiviArticoli(JSON.parse(obPerArticoloJson)); }catch(e){}
    }
  },[obPerArticoloJson]);
  // OBIETTIVO EFFETTIVO: se esiste un valore congelato (turno chiuso), usa quello e non ricalcolare.
  const obFinaleEffettivo = (obCongelato!=null) ? obCongelato : obDaCongelare;
  // CONGELAMENTO a turno chiuso (con freno anti-ricongelamento dopo una correzione di orario:
  // per qualche secondo non ricongeliamo, così l'obiettivo si ricalcola sui dati freschi).
  React.useEffect(()=>{
    if(turnoTerminato && obCongelato==null && obDaCongelare!=null && obDaCongelare>0){
      let _ultModifica = 0;
      try{ _ultModifica = Number(localStorage.getItem("nexus_ult_modifica_orario")||"0"); }catch(e){}
      const _trascorsi = Date.now() - _ultModifica;
      if(_ultModifica>0 && _trascorsi < 8000){
        const _t = setTimeout(()=>{ setObCongelato(c=>c); }, 8000 - _trascorsi + 200);
        return ()=>clearTimeout(_t);
      }
      fetch(nexusUrl("salvaObiettivoCongelato",{linea:lineaId,obiettivo:obDaCongelare,perArticolo:obPerArticoloJson}))
        .then(r=>r.json()).then(()=>{ setObCongelato(obDaCongelare); }).catch(()=>{});

  },[turnoTerminato, obCongelato, obDaCongelare, lineaId, tick]);
  // SALVATAGGIO CONTINUO: fotografa l'obiettivo su D1 ad ogni variazione (anche a turno in corso),

  },[obDaCongelare, turnoTerminato, obCongelato, lineaId]);
  const ob60 = obFinaleEffettivo!=null&&oreTotali>0 ? Math.round(obFinaleEffettivo/oreTotali) : null;

  //    (come stamattina). È il "quanto sei avanti sul piano", stabile durante il turno.
  //  • TURNO TERMINATO: efficienza vera = (borse OK × TC) / minuti presenza linea, dove i minuti

  const efficienzaPct = (()=>{

    if(_isRMALinea){

      const quotaBorse = (baseAtteso!=null && baseAtteso>0) ? (borseTot/baseAtteso) : 0;
      return Math.round(quotaBorse*100 + (minutiAttivitaRMA/minDisp)*100);

    if(!turnoTerminato){

      return Math.round(borseTot/baseAtteso*100);
    }

    // foglio "Presenze Linea" sincronizzato in D1 (un valore per linea = una card). Ripiego sul calcolo
    // reale locale solo finché i minuti del foglio non sono ancora arrivati in D1.
    const minLav = minutiPresenzaLinea>0 ? minutiPresenzaLinea : minutiLavReali();

    // Minuti prodotti = somma, per ogni articolo attivo oggi sulla linea, di (borse OK × TC articolo).
    const _lNome = (linee.find(l=>l.id===lineaId)||{}).nome||lineaId;

    let minProd = 0;
    for(const s of sessioni){

      if(!sk || isSkuSpeciale(sk) || _skuVisti.has(sk)) continue;

  const borse=borseOggi||0;

  const colQualita = pctQualita===null?"#94a3b8":pctQualita>=95?"#22c55e":pctQualita>=85?"#f59e0b":"#ef4444";
  const colBorse=ob60&&borse>=ob60?"#22c55e":ob60&&borse>=ob60*0.8?"#f59e0b":"#ef4444";

  if(nOp===0 && !turnoTerminato) return (
    <div style={{textAlign:"center",padding:"32px 16px",color:"#94a3b8"}}>
      <div style={{fontSize:40,marginBottom:8}}>⏸</div>
      <div style={{fontSize:14,fontWeight:600}}>Nessun operatore attivo</div>

    <div style={{padding:"16px 12px",display:"flex",flexDirection:"column",flex:1}}>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:"rgba(255,255,255,0.08)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:"1px solid rgba(167,139,250,0.8)",borderRadius:10,padding:"10px 14px",boxShadow:"0 8px 32px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(124,58,237,0.2)"}}>

        </div>

      )}

            {/* LAYOUT: colonna sinistra 3 card alte | colonna destra articoli */}
      <div style={{display:"flex",gap:8,alignItems:"stretch",marginBottom:8,...(!compatto?{flex:2,minHeight:0}:{})}}>

        {/* COLONNA SINISTRA - 3 card che si estendono per tutta l'altezza */}

          {/* Operatori */}
          <div style={{flex:compatto?"0 0 auto":1,background:"#ffffff",border:"2px solid #7c3aed",boxShadow:"0 0 18px 4px #7c3aed88, inset 0 0 8px #7c3aed22",borderRadius:16,padding:compatto?"5px 6px":"12px",textAlign:"center",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center"}}>

            // Articoli da mostrare: si parte da TUTTE le sessioni di oggi (anche chiuse), non solo
            // dalle attive. Così un articolo lavorato e poi chiuso in giornata (es. cambio articolo

            const skuAttiviLineaRaw=[...new Set(

            const _nomeLineaForKey = linee ? (linee.find(l=>l.id===lineaId)||{}).nome||lineaId : lineaId;
            const _oggi00Sku = new Date(); _oggi00Sku.setHours(0,0,0,0);
            // Una sessione "ha lavorato" su (linea, sku) se uno dei suoi segmenti coincide
            // con la coppia. Calcola anche i minuti effettivi spesi su quella coppia.
            const minutiSessioneSu = (s, lid, sk)=>{
              // Le sessioni normali hanno tsInizio (numero), non sempre 'inizio' (stringa ISO).
              const tIn = (s.tsInizio && s.tsInizio>0) ? Number(s.tsInizio) : (parseData(s.inizio)?.getTime());
              if(!tIn || tIn < _oggi00Sku.getTime()) return 0;
              const finMs = s.fine ? ((parseData(s.fine)?.getTime())|| (s.tsFine?Number(s.tsFine):Date.now())) : Date.now();
              const trasf = (s.trasferimenti||[]).filter(t=>t.ts).sort((a,b)=>a.ts-b.ts);
              // CASO SENZA trasferimenti interni (la stragrande maggioranza col modello checkout+checkin):
              // l'articolo/linea effettivi sono quelli CORRENTI. Conta tutto il periodo se coincide.
              if(trasf.length===0){
                const lc = s.lineaCorrente || s.lineaInizio;
                const sc = s.skuCorrente || s.sku;
                if(lc===lid && sc===sk && finMs>tIn) return (finMs - tIn)/60000;
                return 0;
              }
              // CASO CON trasferimenti: ricostruisci i segmenti dallo stato iniziale.
              let lc = s.lineaInizio || s.lineaCorrente;
              let sc = s.sku || s.skuCorrente;
              let cur = tIn;
              let totMs = 0;
              for(const t of trasf){
                if(lc===lid && sc===sk && t.ts > cur) totMs += (t.ts - cur);
                cur = t.ts; lc = t.a||lc; sc = t.skuA||sc;
              }
              if(lc===lid && sc===sk && finMs > cur) totMs += (finMs - cur);
              return totMs/60000;
            };
            const skuAttiviLinea = skuAttiviLineaRaw.filter(sk=>{
              // Qualità: se ci sono borse/KO/MIGL registrati, la card va sempre mostrata
              const q = qualitaPerSku[lineaId+"_"+sk] || qualitaPerSku[_nomeLineaForKey+"_"+sk] || {};
              if((q.ok||0)>0 || (q.ko||0)>0 || (q.migl||0)>0) return true;
              // Mostra la card SOLO se c'è almeno un operatore ATTIVO ora su questo (linea, articolo):
              // una sessione APERTA con linea/articolo correnti = lineaId/sk. Gli articoli con sole
              // sessioni CHIUSE (trasferiti/finiti → 0 operatori dedicati) non compaiono più, così i
              // residui dei trasferimenti spariscono da soli. Quelli con borse/KO restano (regola sopra).
              for(const s of sessioni){
                const _ap = !s.fine||s.fine===""||s.fine===null||s.fine==="null";
                if(!_ap) continue;
                const _lc = s.lineaCorrente||s.lineaInizio;
                const _sc = s.skuCorrente||s.sku;
                if(_lc===lineaId && _sc===sk) return true;
              }
              return false;

            if(skuAttiviLinea.length===0) return (

            // Raggruppa in coppie per 2 colonne

            // Font e padding dinamici in base al numero di RIGHE (coppie)

            const nRighe = Math.ceil(nSku/2);
            // Un solo articolo: la card occupa tutta la riga → c'è molto più spazio per i valori.

            // 2 articoli per riga

            const fSvg   = compatto ? (nRighe<=1?13:11) : (nRighe<=1?24:nRighe<=2?18:14);

            const hdrPad = compatto ? "4px 8px" : (nRighe<=1?"10px 16px":nRighe<=2?"7px 12px":"4px 8px");
            const hdrFs  = compatto ? (nRighe<=1?"clamp(10px,1.4vw,13px)":"clamp(9px,1.2vw,12px)")
                                    : (nRighe<=1?"clamp(14px,2.2vw,20px)":nRighe<=2?"clamp(12px,1.8vw,16px)":"clamp(10px,1.4vw,13px)");
            const cardPad= compatto ? "3px 5px" : (nRighe<=1?"8px 12px":nRighe<=2?"5px 8px":"3px 5px");

            return coppie.map((coppia,ci)=>(
              <div key={ci} style={{display:"flex",flexDirection:"row",flexWrap:compatto?"wrap":"nowrap",gap:compatto?6:8,flex:compatto?"0 0 auto":1,minHeight:0,minWidth:0}}>
              {coppia.map(skuItem=>{
              const skuObjItem=skuList.find(x=>x&&x.sku===skuItem);
              const tcItem=tcPerLinea(skuObjItem);
              // Obiettivo finale
              // Calcolo obiettivo: minuti effettivi divisi equamente per numero di articoli attivi
              // A turno terminato include anche le sessioni già chiuse.
              const obFinaleItem = tcItem>0 ? (()=>{
                // Filtra sessioni di OGGI su questo SKU specifico per la linea.
                // Se turno attivo: solo sessioni senza CHECKOUT.
                // Se turno terminato: tutte le sessioni di oggi (anche chiuse).
                const oggi00 = new Date(); oggi00.setHours(0,0,0,0);
                // Una sessione "tocca" questo (linea, sku) se in qualche segmento (inizio, trasferimenti)
                // la persona ha lavorato proprio qui. Non basta più filtrare sullo SKU corrente:
                // dopo un trasferimento lo SKU corrente è cambiato, ma i minuti pre-trasferimento
                // appartengono allo SKU di partenza.
                // Helper: oggetto Date di inizio sessione. Le sessioni normali hanno tsInizio
                // (numero) ma non sempre 'inizio' (stringa ISO) → fallback su tsInizio.
                const _dInizio = (s)=>{
                  if(s.inizio){ const d=parseData(s.inizio); if(d) return d; }
                  if(s.tsInizio && s.tsInizio>0) return new Date(s.tsInizio);
                  return null;
                };
                const sessTocca = (s)=>{
                  if(isSkuSpeciale(s.skuCorrente||s.sku||"")) return false;
                  const d = _dInizio(s);
                  if(!d || d.getTime() < oggi00.getTime()) return false;
                  // Stato iniziale (linea, sku) della sessione
                  let lc = s.lineaInizio || s.lineaCorrente, sc = s.sku || s.skuCorrente;
                  if(lc===lineaId && sc===skuItem) return true;
                  // Scorri i trasferimenti: dopo ognuno la coppia cambia
                  const trasf = (s.trasferimenti||[]).filter(t=>t.ts).sort((a,b)=>a.ts-b.ts);
                  for(const t of trasf){
                    lc = t.a || lc; sc = t.skuA || sc;
                    if(lc===lineaId && sc===skuItem) return true;
                  }
                  return false;
                };
                const filtraSess = sessTocca;
                const sessioniSku = sessioni.filter(filtraSess);
                // Conta SKU simultanei per ogni matricola (per divisione equa)
                // Fine effettiva (ms) di una sessione, dall'INIZIO REALE (articoli aggiunti a
                // meta giornata = ora di aggiunta), checkout reale se uscita anticipata >2min.
                const _fineEffMs = (s)=>{
                  const dIni = tsInizioRealeSessione(s); if(!dIni) return null;
                  const giornoBase = new Date(dIni); giornoBase.setHours(0,0,0,0);
                  let sFin = secFineTurnoAssoluto;
                  const _fp = s.orarioFineOggiPian || s.orarioFinePian || "";
                  let sPian = secFineTurnoAssoluto;

                    const startDragKo=(clientX,clientY,btnEl)=>{
                      const base = koDragMap[skuItem] || {x:0,y:0};
                      const orig = {x:clientX, y:clientY, bx:base.x, by:base.y};
                      let moved=false;
                      const ANCORA_Y=0.30; // partenza: in alto (centro bottone al 30% dell'altezza card)
                      const calcLimiti=()=>{
                        const cardEl = btnEl && btnEl.offsetParent;
                        if(!btnEl||!cardEl) return {mx:9999,minY:-9999,maxY:9999};
                        const cr=cardEl.getBoundingClientRect(), br=btnEl.getBoundingClientRect();
                        const pad=6;
                        const cY=ANCORA_Y*cr.height;
                        return {
                          mx:Math.max(0,(cr.width-br.width)/2-pad),
                          minY:(pad+br.height/2)-cY,
                          maxY:(cr.height-pad-br.height/2)-cY
                        };
                      };
                      const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
                      const onMove=(mx,my)=>{ const dx=mx-orig.x, dy=my-orig.y; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const L=calcLimiti(); setKoDragMap(p=>({...p,[skuItem]:{x:clamp(orig.bx+dx,-L.mx,L.mx), y:clamp(orig.by+dy,L.minY,L.maxY)}})); };
                      const mm=(e)=>{ onMove(e.clientX,e.clientY); };
                      const tm=(e)=>{ if(e.touches[0]){ e.preventDefault(); onMove(e.touches[0].clientX,e.touches[0].clientY); } };
                      const up=()=>{ document.removeEventListener("mousemove",mm); document.removeEventListener("mouseup",up); document.removeEventListener("touchmove",tm); document.removeEventListener("touchend",up); koDragRef.current={sku:skuItem,moved}; };

{/* Barra progresso 8 ore - usa tick per aggiornamento al secondo. Nascosta in vista griglia. */}
      {!compatto&&ob60!==null&&(()=>{

        const secOra = _secOra;

        // Atteso a quest'ora = somma per articolo fino ad ADESSO (ognuno sulla propria finestra),

        const deltaB = borse - obiettivoOraAttuale;
        const ritardo = deltaB < 0;
        const pctRitardo = obiettivoOraAttuale > 0 ? Math.abs(deltaB) / ob60 * 100 : 0;
        const colore = !ritardo ? "#22c55e" : pctRitardo <= 10 ? "#84cc16" : pctRitardo <= 25 ? "#f59e0b" : pctRitardo <= 50 ? "#f97316" : "#ef4444";

        const _oreAllaProssima = Math.min(oreTotali, prossimaOraDecimale - oraInizioDecimale);

        const _oggiBaseProx=new Date(); _oggiBaseProx.setHours(0,0,0,0);

        const borseAProssimaOra = (prossimaOraInt>=oraTurnoFine)

        return (

                <div style={{position:"absolute",top:0,left:0,height:"100%",width:percTempo.toFixed(3)+"%",background:"linear-gradient(90deg,#4c1d95,#7c3aed,#a78bfa)",borderRadius:40,transition:"width 1s linear",boxShadow:"0 0 14px 4px #7c3aed88"}}/>
                {/* Timer countdown al centro */}
                {(()=>{
                  const secOra2 = _now.getHours()*3600+_now.getMinutes()*60+_now.getSeconds();
                  const secRim = Math.max(0, secFineTurnoAssoluto - secOra2);
                  const textColor = percTempo>50?"#ffffff":"#1e293b";
                  if(secRim<=0) return (

                      <span style={{display:"inline-flex",alignItems:"center",gap:7,background:"#ffffff",border:"2px solid #ff6363",borderRadius:8,padding:"5px 14px",fontSize:16,fontWeight:800,color:"#ff6363",lineHeight:1}}>⏹ Turno terminato</span>
                    </div>
                  );
                  const hR=Math.floor(secRim/3600), mR=Math.floor((secRim%3600)/60), sR=secRim%60;
                  return (
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}>
                      <span style={{fontSize:"clamp(28px,4vw,52px)",fontWeight:900,color:textColor,fontFamily:"'Montserrat',sans-serif",letterSpacing:1}}>
                        {String(hR).padStart(2,"0")}:{String(mR).padStart(2,"0")}:{String(sR).padStart(2,"0")}
                      </span>

              {/* Orari sotto - basati sul primo check-in reale */}
              <div style={{position:"relative",height:24,marginTop:2}}>
                {Array.from({length:Math.ceil(oreTotali)+1},(_,h)=>h).map(h=>{

// ── TAB RIEPILOGO ─────────────────────────────────────────────────────────────
// Card stile "Entra in produzione" con due archetti: EFFICACIA (borse OK / obiettivo)
// ed EFFICIENZA (minuti prodotti = borse*tc / minuti lavorati netti). Filtri: giorno o
// settimana + brand (preso dall'anagrafica articoli, campo brand del Registro TC).
// I dati arrivano dall'azione worker "riepilogoStorico" (storico_qualita + storico_presenze).
function TabRiepilogo({ skuList=[], linee=[] }) {
  const oggiISO = (()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); })();
  const [modo, setModo] = React.useState("giorno");   // "giorno" | "settimana"
  const [data, setData] = React.useState(oggiISO);
  const [brand, setBrand] = React.useState("__tutti__");
  const [righe, setRighe] = React.useState(null);
  const [operatori, setOperatori] = React.useState({});   // linea -> n° operatori
  const [loading, setLoading] = React.useState(false);
  const [errore, setErrore] = React.useState("");

  // sku -> {brand, tc, descrizione}
  const skuInfo = React.useMemo(()=>{
    const m={}; (skuList||[]).forEach(s=>{ if(s&&s.sku) m[String(s.sku).toUpperCase()]={brand:s.brand||"", tc:Number(s.tc)||0, descrizione:s.descrizione||""}; });
    return m;
  }, [skuList]);

  // brand disponibili
  const brands = React.useMemo(()=>{
    const set=new Set(); (skuList||[]).forEach(s=>{ if(s&&s.brand&&String(s.brand).trim()) set.add(String(s.brand).trim()); });
    return [...set].sort();
  }, [skuList]);

  // intervallo [dal, al] in ms dalla data + modo
  const intervallo = ()=>{
    const p=(data||oggiISO).split("-").map(Number);
    const base=new Date(p[0],(p[1]||1)-1,p[2]||1,0,0,0,0);
    if(modo==="giorno"){ const dal=base.getTime(); return {dal, al:dal+86400000-1}; }
    const gg=base.getDay(); const offLun=(gg===0?-6:1-gg);
    const lun=new Date(base); lun.setDate(base.getDate()+offLun); lun.setHours(0,0,0,0);
    const dal=lun.getTime(); return {dal, al:dal+7*86400000-1};
  };

  const carica = async ()=>{
    setLoading(true); setErrore(""); setRighe(null); setOperatori({});
    const {dal, al}=intervallo();
    try{
      const r=await fetch(nexusUrl("riepilogoStorico",{dal:String(dal), al:String(al)}),{mode:"cors"});
      const j=await r.json();
      const d=(j&&j.ok&&j.data)?j.data:{};
      setRighe(Array.isArray(d.righe)?d.righe:[]);
      setOperatori(d.operatori||{});
    }catch(e){ setErrore("Errore nel caricamento dei dati."); setRighe([]); }
    setLoading(false);
  };
  React.useEffect(()=>{ carica(); /* eslint-disable-next-line */ }, [modo, data]);

  // righe filtrate per brand, arricchite con brand/tc/ko/migl
  const datiCard = React.useMemo(()=>{
    if(!righe) return [];
    const out=[];
    righe.forEach(r=>{
      const info=skuInfo[String(r.sku||"").toUpperCase()]||{brand:"", tc:0, descrizione:""};
      if(brand!=="__tutti__" && (info.brand||"")!==brand) return;
      out.push({
        linea:r.linea||"", sku:r.sku||"", descrizione:info.descrizione||"", brand:info.brand||"", tc:info.tc||0,
        borse:Number(r.borse_ok)||0, ob:Number(r.ob_reale)||0, minLav:Number(r.minuti_lav)||0,
        ko:Number(r.ko)||0, migl:Number(r.migl)||0
      });
    });
    return out;
  }, [righe, brand, skuInfo]);

  const lineaObj = (id)=> (linee||[]).find(x=>String(x.id)===String(id)||String(x.nome)===String(id));
  const coloreLinea = (id)=>{ const l=lineaObj(id); return (l&&l.colore)||"#7c3aed"; };
  const nomeLinea = (id)=>{ const l=lineaObj(id); return (l&&l.id)||id||"—"; };

  // raggruppa per linea + calcola totali e indici di linea
  const cardLinee = React.useMemo(()=>{
    const g={};
    datiCard.forEach(c=>{ (g[c.linea]=g[c.linea]||[]).push(c); });
    return Object.keys(g).map(lid=>{
      const arts=g[lid];
      let borse=0, ob=0, minLav=0, minProd=0, ko=0, migl=0;
      arts.forEach(a=>{ borse+=a.borse; ob+=a.ob; minLav+=a.minLav; minProd+=a.borse*(a.tc||0); ko+=a.ko; migl+=a.migl; });
      return {
        lid, nome:nomeLinea(lid), colore:coloreLinea(lid), arts,
        borse, ob, minLav, ko, migl, nOp:operatori[lid]||0,
        efficacia: ob>0 ? Math.round(borse/ob*100) : 0,
        efficienza: minLav>0 ? Math.round(minProd/minLav*100) : 0
      };
    }).sort((a,b)=> String(a.nome).localeCompare(String(b.nome)));
  }, [datiCard, operatori, linee]);

  // archetto identico a quello della produzione (semicerchio), colorato col colore della linea
  const Arco = ({pct, label, colore})=>(
    <div style={{flex:1,minWidth:0,background:"#fff",border:"2px solid "+colore,boxShadow:"0 0 12px 3px "+colore+"44, inset 0 0 6px "+colore+"22",borderRadius:12,padding:"7px 4px 3px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:"clamp(9px,1.1vw,12px)",color:"#111827",fontWeight:800,letterSpacing:0.5,marginBottom:2,whiteSpace:"nowrap"}}>{label}</div>
      <svg viewBox="0 0 200 110" style={{width:"100%",display:"block"}}>
        <path d="M 10 100 A 90 90 0 0 1 190 100" fill="none" stroke="#e2e8f0" strokeWidth="16" strokeLinecap="round"/>
        {pct>0&&pct<100&&<path d="M 10 100 A 90 90 0 0 1 190 100" fill="none" stroke={colore} strokeWidth="16" strokeLinecap="round" strokeDasharray={(pct/100)*Math.PI*90+" "+(Math.PI*90)} style={{filter:"drop-shadow(0 0 6px "+colore+")"}}/>}

function aggiungiGiorniLavorativi(dataInizio, giorni) {
  var d = new Date(dataInizio);
  var aggiunti = 0;
  while (aggiunti < giorni) {
    d.setDate(d.getDate() + 1);
    var gg = d.getDay();
    if (gg !== 0 && gg !== 6 && !isFestivitaJS(d)) aggiunti++; // salta sab, dom e festività
  }
  return d;
}

// Confronto data robusto: normalizza giorno/mese/anno da QUALUNQUE formato
// (gg/mm/aaaa, g/m/aaaa, aaaa-mm-gg ISO, con ora attaccata, spazi/nbsp parassiti)
// ed evita il fragile confronto stringa slice(0,10). Restituisce true se stesso giorno.
function _gma(v){
  if(v==null) return null;
  var s = String(v).replace(/\u00A0/g," ").trim();
  if(!s) return null;
  var mSlash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(mSlash){ return {g:+mSlash[1], m:+mSlash[2], a:+mSlash[3]}; }
  var mIso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(mIso){ return {g:+mIso[3], m:+mIso[2], a:+mIso[1]}; }
  var d = new Date(s);
  if(!isNaN(d)) return {g:d.getDate(), m:d.getMonth()+1, a:d.getFullYear()};
  return null;
}
function stessoGiornoData(a, b){
  var x = _gma(a), y = _gma(b);
  if(!x || !y) return false;
  return x.g===y.g && x.m===y.m && x.a===y.a;
}

function RiepSku({ sessioni:_sessioni, linee:_linee, rampeSheets:_rampeSheets, skuList:_skuList, lineaFiltro=null }) { const [tick,setTick] = useState(0);
  // Difesa: gli array possono contenere elementi null (righe vuote da Sheets/worker). Filtriamoli.
  const sessioni = (_sessioni||[]).filter(Boolean);
  const linee = (_linee||[]).filter(Boolean);
  const rampeSheets = (_rampeSheets||[]).filter(Boolean);
  const skuList = (_skuList||[]).filter(Boolean);
  const [riepilogo, setRiepilogo] = useState([]);
  const [modRampa, setModRampa] = useState(null); // {sku, lineaId, dataAttuale, dataNuova, err}
  const [confElimRampa, setConfElimRampa] = useState(null); // {sku, lineaId} per conferma eliminazione
  const [refreshKey, setRefreshKey] = useState(0);
  const [modDurata, setModDurata] = useState(null); // {key, sku, lineaId, val, err} editor giorni di rampa
  const [durataOverride, setDurataOverride] = useState({}); // {key: giorni} override locale immediato
  const [nOpOverride, setNOpOverride] = useState({}); // {sku: numero personalizzato} per scenari "what-if"
  const [filtroStato, setFiltroStato] = useState("attive"); // attive | completate | tutte
  const [filtroDataDa, setFiltroDataDa] = useState("");
  const [filtroDataA, setFiltroDataA] = useState("");
  const [cercaSku, setCercaSku] = useState("");
  const [operatoriPerGiorno, setOperatoriPerGiorno] = useState([]); // [{sku, data:dd/MM/yyyy, nOperatori}]
  const [rampeStorico, setRampeStorico] = useState([]); // rampe completate archiviate
  const [storicoAperto, setStoricoAperto] = useState(null); // chiave sku|||linea della rampa storica espansa
  useEffect(()=>{
    // Carica riepilogo da Apps Script per dati storici borse prodotte
    fetch(nexusUrl("leggiRiepilogo",{})).then(r=>r.json()).then(j=>{
      if(j.ok&&j.data&&j.data.righe) setRiepilogo((j.data.righe||[]).filter(Boolean));
    }).catch(()=>{});
    // Carica operatori unici per giorno+sku per media rampa
    fetch(nexusUrl("leggiOperatoriPerGiorno",{})).then(r=>r.json()).then(j=>{
      if(j.ok&&j.data&&j.data.righe) setOperatoriPerGiorno((j.data.righe||[]).filter(Boolean));
    }).catch(()=>{});
    // Carica rampe completate archiviate (storico curve teorica vs reale)
    fetch(nexusUrl("leggiRampeStorico",{})).then(r=>r.json()).then(j=>{
      if(j.ok&&j.data&&j.data.storico) setRampeStorico((j.data.storico||[]).filter(Boolean));
    }).catch(()=>{});
  },[]);
  useEffect(()=>{const t=setInterval(()=>setTick(x=>x+1),60000);return()=>clearInterval(t);},[]);
  const rampaMap = {};
  // Chiave composita SKU|||LINEA: ogni linea ha la SUA rampa indipendente.
  const KEYSEP = "|||";
  // Leggi rampe da rampeSheets (tabella rampe del DB). Il campo è `dal`, supporto anche legacy `rampaDal`.
  for(const r of (rampeSheets||[])){
    const dal = r.dal || r.rampaDal;
    const lid = r.linea_id || r.lineaId || "";
    if(r.sku && dal){
      const g = giorniLavorativiJS(dal);
      const key = r.sku + KEYSEP + lid;
      // Se più record per stessa coppia sku+linea, prendi quello con data più recente
      if(!rampaMap[key] || dal > rampaMap[key].dal) {
        rampaMap[key] = { sku:r.sku, dal, giorni:g, lineaId:lid, completata: !!r.completata, durata:(r.durata!=null && +r.durata>=2)?+r.durata:15 };
      }
    }
  }
  // Estrai rampe anche dalle sessioni attuali (per coppie sku+linea non ancora in rampeSheets)
  for(const s of sessioni){ let rdal = s.rampaDal||null;
    if(!rdal && (s.skuA||"").includes("__RAMPA__")){ const p=(s.skuA||"").split("__RAMPA__"); const d=new Date(p[1]); if(!isNaN(d)) rdal=d.getTime(); }
    if(rdal){ const sku=s.skuCorrente||s.sku||""; const lid=s.lineaCorrente||""; const key=sku+KEYSEP+lid; if(sku&&!rampaMap[key]){ const g=giorniLavorativiJS(rdal); rampaMap[key]={sku,dal:rdal,giorni:g,lineaId:lid,completata:false,durata:15}; } } }
  for(const _k in durataOverride){ if(rampaMap[_k]) rampaMap[_k].durata = durataOverride[_k]; }
  const totMap={}, linMap={};
  for(const s of sessioni){ for(const {linea,sku,ms} of tappe(s)){ if(!sku||!ms||isNaN(ms)) continue; totMap[sku]=(totMap[sku]||0)+ms; if(!linMap[sku])linMap[sku]={}; linMap[sku][linea]=(linMap[sku][linea]||0)+ms; } }
  // Filtri storici: stato (attive/completate/tutte), range date, ricerca SKU
  const fDataDaTs = filtroDataDa ? (()=>{ const [y,m,g]=filtroDataDa.split("-").map(n=>parseInt(n,10)); return new Date(y,m-1,g,0,0,0,0).getTime(); })() : null;
  const fDataATs = filtroDataA ? (()=>{ const [y,m,g]=filtroDataA.split("-").map(n=>parseInt(n,10)); return new Date(y,m-1,g,23,59,59,999).getTime(); })() : null;
  const queryCerca = (cercaSku||"").trim().toUpperCase();
  const tuttiSku = Object.keys(rampaMap)
    .filter(key => {
      const r = rampaMap[key];

                  </div>
                </div>
                {/* Grafico espanso */}
                {aperto&&(()=>{

                  const px=i=>PL+i*xStep;
                  const py=v=>PT+iH-(v/yMax*iH);

                  const ptsR=reale.map((v,i)=>px(i)+","+py(v||0)).join(" ");

                        <polyline points={ptsT} fill="none" stroke="#ff6937" strokeWidth="2" strokeLinejoin="round"/>
                        {teorica.map((v,i)=><circle key={"t"+i} cx={px(i)} cy={py(v||0)} r="2" fill="#ff6937"/>)}
                        {/* curva reale (verde) */}
                        <polyline points={ptsR} fill="none" stroke="#22c55e" strokeWidth="2" strokeLinejoin="round"/>
                        {reale.map((v,i)=><circle key={"r"+i} cx={px(i)} cy={py(v||0)} r="2" fill="#22c55e"/>)}
                        <line x1={PL} y1={PT} x2={PL} y2={PT+iH} stroke="#cbd5e1" strokeWidth="1"/>
                        <line x1={PL} y1={PT+iH} x2={W-PR} y2={PT+iH} stroke="#cbd5e1" strokeWidth="1"/>
                      </svg>
                      <div style={{display:"flex",gap:16,marginTop:4,justifyContent:"center"}}>
                        <div style={{fontSize:10,color:"#ff6937",display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:2,background:"#ff6937",display:"inline-block",borderRadius:1}}></span>Teorica ({totT})</div>

                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>
      ); })()}

// Torta SVG (nessuna libreria) con legenda + percentuali. voci: [{label, valore, colore}].
function TortaQ({ titolo, voci, totaleLabel }){
  const vis = (voci||[]).filter(v=>(v.valore||0)>0);
  const tot = vis.reduce((s,v)=>s+v.valore,0);
  const size=180, cx=size/2, cy=size/2, r=size/2-3;
  const rad=a=>a*Math.PI/180;
  let ang=-90;
  return (
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,padding:18,flex:"1 1 340px",minWidth:300,boxShadow:"0 1px 4px rgba(124,58,237,0.06)"}}>
      <div style={{fontSize:14,fontWeight:800,color:"#6d28d9",textTransform:"uppercase",letterSpacing:0.5,marginBottom:14,textAlign:"center"}}>{titolo}</div>
      {tot<=0 ? (
        <div style={{textAlign:"center",color:"#94a3b8",padding:"36px 0",fontSize:13}}>Nessun dato nel periodo</div>
      ) : (
        <div style={{display:"flex",alignItems:"center",gap:18,flexWrap:"wrap",justifyContent:"center"}}>
          <svg width={size} height={size} viewBox={"0 0 "+size+" "+size} style={{flexShrink:0}}>
            {vis.length===1 ? (
              <circle cx={cx} cy={cy} r={r} fill={vis[0].colore}/>
            ) : vis.map((v,i)=>{
              const frac=v.valore/tot; const a0=ang, a1=ang+frac*360; ang=a1;
              const x0=cx+r*Math.cos(rad(a0)), y0=cy+r*Math.sin(rad(a0));
              const x1=cx+r*Math.cos(rad(a1)), y1=cy+r*Math.sin(rad(a1));
              const lg=(a1-a0)>180?1:0;
              return <path key={i} d={"M "+cx+" "+cy+" L "+x0.toFixed(2)+" "+y0.toFixed(2)+" A "+r+" "+r+" 0 "+lg+" 1 "+x1.toFixed(2)+" "+y1.toFixed(2)+" Z"} fill={v.colore} stroke="#fff" strokeWidth={2}/>;
            })}
          </svg>
          <div style={{display:"flex",flexDirection:"column",gap:7,minWidth:140,flex:"1 1 auto"}}>
            {vis.map((v,i)=>{ const pct=Math.round(v.valore/tot*100); return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:13}}>
                <span style={{width:13,height:13,borderRadius:3,background:v.colore,flexShrink:0}}/>
                <span style={{fontWeight:700,color:"#1e293b",flex:1,wordBreak:"break-word"}}>{v.label}</span>
                <span style={{fontWeight:800,color:v.colore}}>{v.valore}</span>
                <span style={{color:"#94a3b8",fontSize:11,minWidth:34,textAlign:"right"}}>{pct}%</span>
              </div>
            ); })}
            <div style={{borderTop:"1px solid #f1f5f9",marginTop:4,paddingTop:6,display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:800,color:"#64748b"}}>
              <span>{totaleLabel||"Totale"}</span><span>{tot}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  const [al, setAl]   = React.useState(_oggiISO);
  const [brandSel, setBrandSel] = React.useState("__tutti__");
  const skuBrand = React.useMemo(()=>{ const m={}; (skuList||[]).forEach(s=>{ if(s&&s.sku) m[String(s.sku).toUpperCase()]=String(s.brand||"").trim(); }); return m; },[skuList]);
  const brands = React.useMemo(()=>{ const set=new Set(); (skuList||[]).forEach(s=>{ if(s&&s.brand&&String(s.brand).trim()) set.add(String(s.brand).trim()); }); return Array.from(set).sort(); },[skuList]);
  // Confronto a livello di GIORNO: normalizza la data del record (DD/MM/YYYY, YYYY-MM-DD o con orario)
  // alla mezzanotte locale, e confronta con [dal, al] inclusi (anch'essi mezzanotte locale).
  const _giornoTs = (raw)=>{
    const day = String(raw||"").split(" ")[0].split(",")[0].split("T")[0].trim();
    let mm = day.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(mm) return new Date(+mm[3], +mm[2]-1, +mm[1]).getTime();
    mm = day.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(mm) return new Date(+mm[1], +mm[2]-1, +mm[3]).getTime();
    const d = parseData(raw); return d ? new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime() : null;
  };
  const _dalTs = dal ? new Date(dal+"T00:00:00").getTime() : -Infinity;
  const _alTs  = al  ? new Date(al +"T00:00:00").getTime() :  Infinity;
  const recs = (qualita||[]).filter(q=>{
    if(lineaFiltro && q.linea!==lineaFiltro.id) return false;
    const t = _giornoTs(q.data); if(t==null) return false;
    if(t<_dalTs || t>_alTs) return false;
    if(brandSel!=="__tutti__"){ const b = skuBrand[String(q.sku||"").toUpperCase()]||""; if(b!==brandSel) return false; }
    return true;
  });
  let tOk=0,tKo=0,tMg=0; const noteKoArr=[], noteMgArr=[];
  recs.forEach(q=>{ tOk+=Number(q.ok)||0; tKo+=Number(q.ko)||0; tMg+=Number(q.migliorabili)||0; if(q.noteKo) noteKoArr.push(q.noteKo); if(q.noteMigl) noteMgArr.push(q.noteMigl); });
  const difetti = aggregaDifetti(noteKoArr.concat(noteMgArr)).filter(kv=>kv[1]>0);
  const PALETTE = ["#ef4444","#f59e0b","#7c3aed","#0ea5e9","#10b981","#ec4899","#f97316","#8b5cf6","#14b8a6","#eab308","#06b6d4","#a855f7"];
  const vociQ = [
    {label:"OK", valore:tOk, colore:"#10b981"},
    {label:"KO", valore:tKo, colore:"#ef4444"},
    {label:"Migliorabili", valore:tMg, colore:"#f59e0b"},
  ];
  const vociD = difetti.map((kv,i)=>({label:kv[0], valore:kv[1], colore:PALETTE[i%PALETTE.length]}));
  return (
    <div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-end",marginBottom:18,background:"#faf5ff",border:"1px solid #ede9fe",borderRadius:12,padding:"14px 16px"}}>
        <div><label style={{...S.lbl,display:"block",marginBottom:4,color:"#6d28d9"}}>Dal</label><input type="date" value={dal} max={al} onChange={e=>setDal(e.target.value)} style={{...S.inp,maxWidth:175}}/></div>
        <div><label style={{...S.lbl,display:"block",marginBottom:4,color:"#6d28d9"}}>Al</label><input type="date" value={al} min={dal} onChange={e=>setAl(e.target.value)} style={{...S.inp,maxWidth:175}}/></div>
        <div style={{flex:"1 1 200px",minWidth:180}}><label style={{...S.lbl,display:"block",marginBottom:4,color:"#6d28d9"}}>Brand</label>
          <select value={brandSel} onChange={e=>setBrandSel(e.target.value)} style={{...S.inp}}>
            <option value="__tutti__">Tutti i brand</option>
            {brands.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
        </div>
        <div style={{fontSize:12,color:"#94a3b8",fontWeight:700,paddingBottom:10,whiteSpace:"nowrap"}}>{recs.length} record</div>
      </div>
      <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
        <TortaQ titolo="Qualità · OK / KO / Migliorabili" voci={vociQ} totaleLabel="Totale borse"/>
        <TortaQ titolo="Dettaglio note (KO + Migliorabili)" voci={vociD} totaleLabel="Totale difetti"/>
      </div>
    </div>
  );
}

function DashboardQualita({ linea, linee, skuList, difettiList=[], onEsci }) {
  const [obRealeQ, setObRealeQ]   = React.useState(null);
  const [obTeoricoQ, setObTeoricoQ] = React.useState(null);
  const [skuAttiviOggi, setSkuAttiviOggi] = React.useState(null); // null = caricamento, [] = nessuno
  const [sessioniQ, setSessioniQ] = React.useState([]); // sessioni grezze per la card-mirror nascosta (alimenta obPerArticolo su D1)

  // Carica automaticamente gli obiettivi dalla sezione produzione
  React.useEffect(()=>{
    const caricaObiettivi = async () => {
      try {
        // Prendi sessioni e calcola obiettivi
        const r = await fetch(nexusUrl("sessioni",{}));
        const j = await r.json();
        if(!j.ok||!j.data) return;
        const sessioni = j.data.sessioni||[];
        setSessioniQ(sessioni); // alimenta la card-mirror nascosta
        const lineaId = linea?.id||"";
        const skuConSpecialiList = [...SKU_SPECIALI,...(skuList||[])];
        // SKU attivi oggi su questa linea
        const skuAttiviSet = new Set(sessioni
          .filter(s=>s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null||s.fine==="null")&&s.skuCorrente&&!isSkuSpeciale(s.skuCorrente))
          .map(s=>s.skuCorrente||s.sku));
        setSkuAttiviOggi([...skuAttiviSet]);

        // Calcola primo check-in e fine turno
        const ts = sessioni
          .filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio)
          .map(s=>{ const d=parseData(s.inizio); return d?d.getHours()*3600+d.getMinutes()*60:null; })
          .filter(Boolean);
        if(ts.length===0) return;
        const secInizio = Math.min(...ts);
        const oreTotali = 8; // turno standard
        const secFine = secInizio + oreTotali*3600;

        // SKU più frequente
        const skuCount={};
        sessioni.filter(s=>s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null)).forEach(s=>{
          const sk=s.skuCorrente||s.sku||"";
          if(sk&&!SKU_SPECIALI.some(x=>x.sku===sk)) skuCount[sk]=(skuCount[sk]||0)+1;
        });
        const skuPiu = Object.entries(skuCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||"";
        const skuObj = skuConSpecialiList.find(s=>s&&s.sku===skuPiu);
        const tc = (((lineaId||"").toUpperCase().includes("RMA")) ? (skuObj?.tcRMA||skuObj?.tc||0) : (skuObj?.tc||0));
        if(tc<=0) return;

        // Obiettivo Reale: minuti effettivi / TC
        const sessioniLinea = sessioni.filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio&&!s._pianificato);
        const minPerMat = {};
        sessioniLinea.forEach(s=>{
          const mat = s.matricola||s.nome||s.id; if(!mat) return;
          const sku = s.skuCorrente||s.sku||"";
          if(SKU_SPECIALI.some(x=>x.sku===sku)) return;
          const dI = parseData(s.inizio); if(!dI) return;
          const attiva = !s.fine||s.fine===""||s.fine===null||s.fine==="null";
          const dF = attiva?null:parseData(s.fine);
          if(!minPerMat[mat]) minPerMat[mat]={base:Math.max(0,(secFine-(dI.getHours()*3600+dI.getMinutes()*60))/60),sottrai:0};
          if(s.corsi) s.corsi.forEach(c=>{
            const dC=parseData(c.quando); if(!dC) return;
            const sC=dC.getHours()*3600+dC.getMinutes()*60;
            const eC=c.rientro?(()=>{const dR=parseData(c.rientro);return dR?dR.getHours()*3600+dR.getMinutes()*60:secFine;})():secFine;
            minPerMat[mat].sottrai+=Math.max(0,(eC-sC)/60);
          });
        });
        let minTotali=0;
        Object.values(minPerMat).forEach(({base,sottrai})=>{ minTotali+=Math.max(0,base-sottrai); });
        const obReale = minTotali>0?Math.round(minTotali/tc):null;

        // Obiettivo Teorico: matricole uniche × ore turno / TC
        const matricoleUniche = new Set();
        sessioniLinea.forEach(s=>{
          const mat=s.matricola||s.nome||s.id; if(!mat) return;
          if(SKU_SPECIALI.some(x=>x.sku===(s.skuCorrente||s.sku||""))) return;
          matricoleUniche.add(mat);
        });
        const obTeorico = matricoleUniche.size>0?Math.round(matricoleUniche.size*oreTotali*60/tc):null;

        setObRealeQ(obReale);
        setObTeoricoQ(obTeorico);
      } catch(e){ console.warn("Errore calcolo obiettivi:", e); }
    };
    if(linea){ caricaObiettivi(); const _idObMirror=setInterval(caricaObiettivi,60000); return ()=>clearInterval(_idObMirror); }
  },[linea?.id]);

  const [ok, setOk]         = useState("");

  const [sku, setSku]       = useState("");
  const [cSku, setCSku]     = useState("");
  const [msg, setMsg]       = useState(null);

// NON tocca minuti lavorati. Salva su D1 + foglio "Attività Taglio DG".
function TabAttivita({ repTipo="taglio" }) {
  const _isRMA = repTipo === "rma";
  // RMA usa gli stessi campi di Preparazione DG (N° Richiesta), quindi _isPrep copre entrambi.
  const _isPrep = repTipo === "prep" || repTipo === "rma";
  const oggiISO = ()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
  const [data,setData] = useState(oggiISO());
  const [brand,setBrand] = useState("");
  const [tempo,setTempo] = useState("");
  const [tipologia,setTipologia] = useState(_isPrep ? "Rilavorazione" : ""); // Prep: sola opzione
  const [reparto,setReparto] = useState("");
  const [nRichiesta,setNRichiesta] = useState(""); // solo Preparazione DG
  const [pellame,setPellame] = useState(""); // solo Taglio DG
  const [articolo,setArticolo] = useState(""); // solo RMA, facoltativo, per Campioni/Prototipi
  const [lista,setLista] = useState([]);
  const [caricando,setCaricando] = useState(false);
  const [salvando,setSalvando] = useState(false);
  const [msg,setMsg] = useState("");
  const [modalAperto,setModalAperto] = useState(false);
  const [fabDrag,setFabDrag] = useState(null); // {x,y} posizione pulsante flottante
  const fabDragRef = React.useRef(null);

  const BRANDS = ["Chanel","LV"];
  // RMA: Rilavorazione + Campioni/Prototipi. Preparazione DG: solo Rilavorazione. Taglio DG: Rilavorazione+Collaudo+Cartelloni.
  const TIPOLOGIE = _isRMA ? ["Rilavorazione","Campioni/Prototipi"] : (_isPrep ? ["Rilavorazione"] : ["Rilavorazione","Collaudo","Cartelloni"]);
  const _mostraArticolo = _isRMA && tipologia === "Campioni/Prototipi"; // campo Articolo solo RMA + Campioni/Prototipi
  const _mostraPellame = !_isPrep && tipologia !== "Cartelloni"; // pellame solo Taglio DG e NON per Cartelloni
  const REPARTI = ["Infustiture","Pelle","Collaudo"];
  const PELLAMI = ["AGNELLO","VITELLO","PELLE STAMPATA","TESSUTO"];
  const _titoloRep = _isRMA ? "Attività RMA" : (_isPrep ? "Attività Preparazione DG" : "Attività Taglio DG");

  const carica = ()=>{
    setCaricando(true);
    fetch(nexusUrl("leggiAttivita",{repTipo})).then(r=>r.json()).then(j=>{
      if(j&&j.ok&&j.data&&j.data.attivita) setLista(j.data.attivita);
      setCaricando(false);
    }).catch(()=>setCaricando(false));
  };
  React.useEffect(()=>{ carica(); },[]);

  const fmtData = (iso)=>{ if(!iso) return ""; const p=iso.toString().substring(0,10).split("-"); return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:iso; };

  const salva = async ()=>{
    setMsg("");
    if(!data){ setMsg("Inserisci la data."); return; }
    if(!brand){ setMsg("Seleziona il brand."); return; }
    if(!tempo||+tempo<=0){ setMsg("Inserisci un tempo valido (minuti)."); return; }
    if(!tipologia){ setMsg("Seleziona la tipologia."); return; }
    if(!_isPrep && !reparto){ setMsg("Seleziona il reparto."); return; }
    if(_mostraPellame && !pellame){ setMsg("Seleziona il tipo di pellame."); return; }
    if(_isPrep && !nRichiesta.trim()){ setMsg("Inserisci il N° Richiesta."); return; }
    setSalvando(true);
    try{
      await fetch(nexusUrl("salvaAttivita",{repTipo,data,brand,tempo:String(Math.round(+tempo)),tipologia,reparto:_isPrep?"":reparto,nRichiesta:_isPrep?nRichiesta.trim():"",pellame:_mostraPellame?pellame:"",articolo:_mostraArticolo?articolo.trim():""}));
      setBrand(""); setTempo(""); setReparto(""); setNRichiesta(""); setPellame(""); setArticolo("");
      setTipologia(_isPrep ? "Rilavorazione" : "");
      setMsg("");
      setModalAperto(false);
      setTimeout(carica,600);
    }catch(e){ setMsg("Errore nel salvataggio."); }
    setSalvando(false);
  };

  const elimina = async (id)=>{

  };

  return (
    <div style={{margin:"0 24px 24px",fontFamily:"'Montserrat',sans-serif"}}>
      {/* Intestazione */}
      <div style={{fontWeight:800,fontSize:20,color:"#1e293b",marginBottom:18,display:"flex",alignItems:"center",gap:10}}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#7c3aed" strokeWidth="2"/><path d="M12 7v5l3 2" stroke="#7c3aed" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        {_titoloRep}
      </div>

      {/* ELENCO ATTIVITÀ REGISTRATE */}
      <div style={{background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:16,padding:"18px 20px"}}>
        <div style={{fontWeight:800,fontSize:16,color:"#1e293b",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>Attività registrate {lista.length>0&&<span style={{color:"#94a3b8",fontWeight:600}}>({lista.length})</span>}</span>
          <button onClick={carica} style={{background:"transparent",border:"1.5px solid #cbd5e1",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",color:"#475569",fontFamily:"'Montserrat',sans-serif"}}>↻ Aggiorna</button>
        </div>
        {caricando ? <div style={{textAlign:"center",color:"#94a3b8",padding:"24px",fontSize:14}}>Caricamento...</div>
        : lista.length===0 ? <div style={{textAlign:"center",color:"#94a3b8",padding:"24px",fontSize:14,fontStyle:"italic"}}>Nessuna attività registrata.</div>
        : (
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr>{(_isRMA?["Data produzione","Brand","Tempo [min]","Tipologia","N° Richiesta","Articolo",""]:_isPrep?["Data produzione","Brand","Tempo [min]","Tipologia","N° Richiesta",""]:["Data produzione","Brand","Tempo [min]","Tipologia","Reparto","Pellame",""]).map((h,i,arr)=>(
                  <th key={i} style={{textAlign:i===0?"left":i===arr.length-1?"center":"left",padding:"8px 10px",borderBottom:"2px solid #e2e8f0",color:"#475569",fontWeight:800,fontSize:12,whiteSpace:"nowrap"}}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {lista.map((a)=>(
                  <tr key={a.id} style={{borderBottom:"1px solid #f1f5f9"}}>
                    <td style={{padding:"8px 10px",fontWeight:600}}>{fmtData(a.data)}</td>
                    <td style={{padding:"8px 10px"}}>{a.brand}</td>
                    <td style={{padding:"8px 10px",fontWeight:700,color:"#7c3aed"}}>{a.tempo}</td>
                    <td style={{padding:"8px 10px"}}>{a.tipologia}</td>
                    {_isPrep
                      ? <td style={{padding:"8px 10px",fontWeight:600}}>{a.nRichiesta||a.reparto||""}</td>

                    {!_isPrep&&<td style={{padding:"8px 10px"}}>{a.pellame||""}</td>}

                      <button onClick={()=>elimina(a.id)} title="Elimina attività" style={{background:"#fff",color:"#dc2626",border:"1.5px solid #dc2626",borderRadius:6,padding:"2px 10px",fontWeight:900,fontSize:14,lineHeight:1,cursor:"pointer",fontFamily:"'Montserrat',sans-serif"}}>−</button>
                    </td>

                ))}

            </table>

      {(()=>{
